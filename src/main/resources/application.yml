spring:
  application:
    name: demo
  
  # H2 数据库配置
  datasource:
    url: jdbc:h2:file:./data/testdb
    driver-class-name: org.h2.Driver
    username: sa
    password: password
  
  # JPA 配置
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: update
    show-sql: true
  
  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
  
  # ✅ Jackson 时区配置（解决投票时间显示问题）
  jackson:
    time-zone: GMT+8
    date-format: yyyy-MM-dd HH:mm:ss

# 自定义文件上传配置
file:
  upload:
    path: uploads
    max-size: 5242880

# ✅ 服务器时区配置
server:
  timezone: GMT+8
