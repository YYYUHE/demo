<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>图文发表</title>
    <link href="https://cdn.jsdelivr.net/npm/@wangeditor/editor@5.1.23/dist/css/style.css" rel="stylesheet">
    <link href="/css/editor.css" rel="stylesheet">
    <style>
        .loading-overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 255, 255, 0.8);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }
        .loading-spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #409eff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 12px;
        }
        .loading-text {
            color: #409eff;
            font-size: 15px;
            font-weight: 500;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="page-topbar">
        <div class="topbar-inner">
            <div class="topbar-title">发布图片</div>
            <div class="topbar-center"><span id="saveStatusTop">已自动保存</span></div>
            <div class="topbar-actions">
                <button class="btn btn-link" type="button" onclick="goToDrafts()" aria-label="草稿箱">草稿箱</button>
                <button class="btn" type="button" onclick="saveToDrafts()" aria-label="保存草稿">保存草稿</button>
                <button class="btn" type="button" onclick="openPreviewModal()" aria-label="预览">预览</button>
                <button class="btn btn-primary" type="button" onclick="publishImagePost()" aria-label="发布">发布</button>
                <button class="btn" type="button" onclick="handleCancel()" aria-label="取消">取消</button>
            </div>
        </div>
    </div>

    <div class="page-content">
        <div class="form-card">
            <div class="form-row">
                <div class="form-label">标题</div>
                <div class="form-control">
                    <div class="input-with-counter">
                        <input id="titleInput" class="text-input" type="text" maxlength="30" placeholder="标题(必填)" autocomplete="off">
                        <div class="counter" id="titleCounter">0/30</div>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-label">图片介绍</div>
                <div class="form-control">
                    <div class="editor-wrapper" id="editorWrapper">
                        <div class="editor-toolbar-row">
                            <div id="toolbar-container"></div>
                        </div>
                        <div id="editor-container"></div>
                    </div>
                    <div class="status-bar">
                        <div class="status-left" id="saveStatus">已自动保存</div>
                        <div class="status-right" id="descCounter">0/500</div>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-label">上传图片</div>
                <div class="form-control">
                    <div class="subtext" style="margin-bottom: 10px;">最多可同时上传 18 张，支持 jpg/png/jpeg/gif，单张不超过 5MB</div>
                    <input id="imageInput" class="sr-only" type="file" accept="image/*" multiple>
                    <div class="upload-grid" id="uploadGrid" aria-label="图片上传区"></div>
                </div>
            </div>

            <div class="form-row" style="margin-bottom: 18px;">
                <div class="form-label">发布版块</div>
                <div class="form-control">
                    <div class="radio-group" id="categoryGroup">
                        <label class="radio-option"><input type="radio" name="category" value="交友">交友</label>
                        <label class="radio-option"><input type="radio" name="category" value="二手">二手</label>
                        <label class="radio-option"><input type="radio" name="category" value="失物招领">失物招领</label>
                        <label class="radio-option"><input type="radio" name="category" value="闲聊" checked>闲聊</label>
                    </div>
                </div>
            </div>

            <!-- 投票设置 -->
            <div class="form-row">
                <div class="form-label">投票设置</div>
                <div class="form-control">
                    <button type="button" class="btn btn-primary" onclick="openVoteModal()" style="width: 100%; padding: 12px;">
                        📊 添加投票
                    </button>
                    <div id="voteStatusText" style="display:none; margin-top: 8px; font-size:13px; color:#67c23a;"></div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-label">选择话题</div>
                <div class="form-control">
                    <div class="subtext" style="margin-bottom: 10px;">选择相关话题，获得更多浏览（输入“+话题名”可创建新话题）</div>
                    <div class="topic-search">
                        <input type="text" id="topicSearchInput" class="text-input" placeholder="搜索话题或输入+创建新话题" autocomplete="off">
                        <button type="button" class="btn btn-primary" id="createTopicBtn" onclick="handleCreateTopicFromInput()" style="margin-left: 8px; white-space: nowrap;">创建话题</button>
                    </div>
                    <div class="chips" id="selectedTopics" style="display:none; margin-bottom: 12px;"></div>
                    <div class="subtext" style="margin-bottom: 8px;">推荐话题</div>
                    <div class="chips" id="topicSuggestions"></div>
                </div>
            </div>

            <div class="bottom-actions">
                <button class="publish-btn" id="publishBtnBottom" type="button" onclick="publishImagePost()">发布</button>
            </div>
        </div>
    </div>

    <div class="modal" id="previewModal" role="dialog" aria-modal="true" aria-labelledby="previewTitle">
        <div class="modal-panel">
            <div class="modal-header">
                <div class="modal-title" id="previewTitle">预览</div>
                <button class="modal-close" type="button" onclick="closePreviewModal()" aria-label="关闭">×</button>
            </div>
            <div class="modal-body">
                <h2 class="preview-title" id="previewPostTitle"></h2>
                <div class="preview-meta" id="previewMeta"></div>
                <div class="preview-content" id="previewContent"></div>
                <div class="preview-images" id="previewImages"></div>
            </div>
        </div>
    </div>

    <div class="modal" id="exitModal" role="dialog" aria-modal="true" aria-labelledby="exitTitle">
        <div class="modal-panel" style="width:min(560px, calc(100% - 32px));">
            <div class="modal-header">
                <div class="modal-title" id="exitTitle">提示</div>
                <button class="modal-close" type="button" onclick="closeExitModal()" aria-label="关闭">×</button>
            </div>
            <div class="modal-body">
                <div style="font-size:14px; color:#606266; line-height:1.6;">检测到你有未保存的内容，是否保存到草稿箱？</div>
                <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:16px;">
                    <button class="btn" type="button" onclick="handleExit(false)">不保存</button>
                    <button class="btn btn-primary" type="button" onclick="handleExit(true)">保存</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 投票弹窗 -->
    <div class="modal" id="voteModal" role="dialog" aria-modal="true" aria-labelledby="voteModalTitle">
        <div class="modal-panel" style="width:min(600px, calc(100% - 32px));">
            <div class="modal-header">
                <div class="modal-title" id="voteModalTitle">创建投票</div>
                <button class="modal-close" type="button" onclick="closeVoteModal()" aria-label="关闭">×</button>
            </div>
            <div class="modal-body">
                <div style="margin-bottom: 16px;">
                    <label style="display:block; margin-bottom: 6px; font-size:14px; color:#303133;">投票名称</label>
                    <input type="text" id="voteTitleInput" class="text-input" placeholder="请输入投票名称" maxlength="30">
                    <div style="font-size:12px; color:#909399; margin-top: 4px; text-align:right;"><span id="voteTitleCounter">0</span>/30</div>
                </div>
                
                <div style="margin-bottom: 16px;">
                    <label style="display:block; margin-bottom: 6px; font-size:14px; color:#303133;">截止时间</label>
                    <input type="datetime-local" id="voteDeadlineInput" class="text-input">
                </div>
                
                <div style="margin-bottom: 16px;">
                    <label style="display:block; margin-bottom: 6px; font-size:14px; color:#303133;">设置选项</label>
                    <div id="voteOptionsContainer"></div>
                    <button type="button" class="btn btn-link" onclick="addVoteOptionBtn()" style="padding: 0; margin-top: 8px;">+ 添加选项</button>
                </div>
                
                <div style="margin-bottom: 16px;">
                    <label style="display:block; margin-bottom: 6px; font-size:14px; color:#303133;">最多可选项目</label>
                    <select id="voteMaxChoicesInput" class="text-input" style="height: 36px; padding: 0 8px;">
                        <option value="1">单选</option>
                    </select>
                </div>
                
                <div style="display:flex; justify-content:flex-end; gap:10px; margin-top:20px;">
                    <button class="btn" type="button" onclick="closeVoteModal()">取消</button>
                    <button class="btn btn-primary" type="button" onclick="saveVoteFromModal()">保存投票</button>
                </div>
            </div>
        </div>
    </div>

    <div class="image-viewer" id="imageViewer" onclick="closeImageViewer()">
        <img id="imageViewerImg" alt="">
    </div>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <div class="loading-overlay" id="loadingOverlay" style="display:none;">
        <div class="loading-spinner"></div>
        <div class="loading-text">正在发布中...</div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@wangeditor/editor@5.1.23/dist/index.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        let editor;
        let autoSaveTimer;
        let toastTimer;
        let lastTouchEndTs = 0;
        const CACHE_KEY = 'image_editor_cache_v1';
        const TOPIC_HEAT_KEY = 'topic_heat_map_v1';
        const MAX_IMAGES = 18;
        const MAX_DESC = 500;

        let uploadedImages = [];
        const selectedTopics = new Set();
        let currentDraftId = null;
        let lastSavedDraftSnapshot = null;
        let hasUnsavedChanges = false;
        let isSubmitting = false;
        let imageVoteData = null; // ✅ 存储图片帖子的投票数据
        let voteOptionCount = 2; // ✅ 投票选项数量

        // ✅ 投票弹窗相关函数
        function openVoteModal() {
            const modal = document.getElementById('voteModal');
            if (!modal) return;
            resetVoteForm();
            modal.style.display = 'flex';
        }

        function closeVoteModal() {
            const modal = document.getElementById('voteModal');
            if (!modal) return;
            modal.style.display = 'none';
        }

        function resetVoteForm() {
            const titleEl = document.getElementById('voteTitleInput');
            const deadlineEl = document.getElementById('voteDeadlineInput');
            if (titleEl) titleEl.value = '';
            
            // ✅ 设置默认截止时间为当前时间后10分钟
            if (deadlineEl) {
                const now = new Date();
                const defaultDeadline = new Date(now.getTime() + 10 * 60 * 1000); // 10分钟后
                const year = defaultDeadline.getFullYear();
                const month = String(defaultDeadline.getMonth() + 1).padStart(2, '0');
                const day = String(defaultDeadline.getDate()).padStart(2, '0');
                const hours = String(defaultDeadline.getHours()).padStart(2, '0');
                const minutes = String(defaultDeadline.getMinutes()).padStart(2, '0');
                deadlineEl.value = `${year}-${month}-${day}T${hours}:${minutes}`;
            }
            
            voteOptionCount = 2;
            renderVoteOptionsForModal();
            updateVoteTitleCounter();
        }

        function updateVoteTitleCounter() {
            const titleEl = document.getElementById('voteTitleInput');
            const counterEl = document.getElementById('voteTitleCounter');
            if (!titleEl || !counterEl) return;
            counterEl.textContent = `${(titleEl.value || '').length}/30`;
        }

        function renderVoteOptionsForModal() {
            const container = document.getElementById('voteOptionsContainer');
            if (!container) return;
            container.innerHTML = '';
            for (let i = 1; i <= voteOptionCount; i++) {
                const row = document.createElement('div');
                row.style.cssText = 'display:flex; gap:8px; margin-bottom:8px; align-items:center;';
                
                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'text-input';
                input.placeholder = `选项${i}`;
                input.maxLength = 40;
                input.id = `voteOptionInput${i}`;
                input.style.flex = '1';
                
                row.appendChild(input);
                
                if (voteOptionCount > 2) {
                    const removeBtn = document.createElement('button');
                    removeBtn.type = 'button';
                    removeBtn.textContent = '×';
                    removeBtn.className = 'btn';
                    removeBtn.style.cssText = 'padding:4px 8px; min-width:auto;';
                    removeBtn.onclick = () => removeVoteOptionBtn(i);
                    row.appendChild(removeBtn);
                }
                
                container.appendChild(row);
            }
            
            updateMaxChoicesForModal();
        }

        function addVoteOptionBtn() {
            if (voteOptionCount >= 10) {
                showToast('最多只能添加 10 个选项', 'info');
                return;
            }
            voteOptionCount += 1;
            renderVoteOptionsForModal();
        }

        function removeVoteOptionBtn(idx) {
            if (voteOptionCount <= 2) return;
            voteOptionCount -= 1;
            // 重新渲染，保留已有值
            const values = [];
            for (let i = 1; i <= voteOptionCount + 1; i++) {
                const input = document.getElementById(`voteOptionInput${i}`);
                if (input && i !== idx) {
                    values.push(input.value);
                }
            }
            renderVoteOptionsForModal();
            // 恢复值
            values.forEach((val, i) => {
                const input = document.getElementById(`voteOptionInput${i + 1}`);
                if (input) input.value = val;
            });
        }

        function updateMaxChoicesForModal() {
            const select = document.getElementById('voteMaxChoicesInput');
            if (!select) return;
            const prev = Number(select.value || '1');
            select.innerHTML = '';
            for (let i = 1; i <= voteOptionCount; i++) {
                const opt = document.createElement('option');
                opt.value = String(i);
                opt.textContent = i === 1 ? '单选' : `最多选 ${i} 项`;
                select.appendChild(opt);
            }
            const next = Math.min(Math.max(prev, 1), voteOptionCount);
            select.value = String(next);
        }

        function saveVoteFromModal() {
            const title = (document.getElementById('voteTitleInput')?.value || '').trim();
            const deadline = (document.getElementById('voteDeadlineInput')?.value || '').trim();
            const maxChoices = Number(document.getElementById('voteMaxChoicesInput')?.value || '1');

            const options = [];
            for (let i = 1; i <= voteOptionCount; i++) {
                const v = (document.getElementById(`voteOptionInput${i}`)?.value || '').trim();
                if (v) options.push(v);
            }

            if (!title) {
                showToast('请输入投票名称', 'error');
                return;
            }
            if (options.length < 2) {
                showToast('请至少填写 2 个投票选项', 'error');
                return;
            }

            // ✅ 验证截止日期：不能早于当前时间后5分钟
            if (deadline) {
                const deadlineDate = new Date(deadline);
                const now = new Date();
                const minDeadline = new Date(now.getTime() + 5 * 60 * 1000); // 5分钟后
                
                if (deadlineDate < minDeadline) {
                    showToast('截止时间不能早于当前时间后5分钟', 'error');
                    return;
                }
            }

            // ✅ 保存到全局变量
            imageVoteData = {
                title,
                // ✅ 直接发送本地时间字符串，不要转换为 UTC
                deadline: deadline ? deadline + ':00' : null,  // 添加秒数部分
                maxChoices: Math.min(Math.max(maxChoices, 1), options.length),
                options: options.map((opt, idx) => ({
                    content: opt,
                    sortOrder: idx
                }))
            };

            // 显示投票状态
            const statusText = document.getElementById('voteStatusText');
            if (statusText) {
                statusText.textContent = `✅ 已添加投票: ${title}`;
                statusText.style.display = 'block';
            }

            closeVoteModal();
            markAsChanged();
            showToast('投票已添加', 'success');
        }

        const TOPIC_DEFAULTS = [
            { name: '宿舍生活', heat: 120 },
            { name: '选课攻略', heat: 110 },
            { name: '社团活动', heat: 105 },
            { name: '考研经验', heat: 102 },
            { name: '实习分享', heat: 98 },
            { name: '校园美食', heat: 96 },
            { name: '二手交易', heat: 92 },
            { name: '失物招领', heat: 90 },
            { name: '期末复习', heat: 88 },
            { name: '学习资料', heat: 86 },
            { name: '自习室打卡', heat: 84 },
            { name: '校园通知', heat: 82 },
            { name: '奖学金申请', heat: 80 },
            { name: '四六级备考', heat: 78 }
        ];

        function escapeHtml(str) {
            return String(str)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            if (!toast) return;
            toast.className = `toast show ${type}`;
            toast.textContent = message;
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => {
                toast.className = 'toast';
            }, 2600);
        }

        function setSaveStatus(text, color) {
            const top = document.getElementById('saveStatusTop');
            const main = document.getElementById('saveStatus');
            if (top) {
                top.textContent = text;
                if (color) top.style.color = color;
            }
            if (main) {
                main.textContent = text;
                if (color) main.style.color = color;
            }
        }

        function updateTitleCounter() {
            const input = document.getElementById('titleInput');
            const counter = document.getElementById('titleCounter');
            if (!input || !counter) return;
            counter.textContent = `${(input.value || '').length}/30`;
        }

        function updateDescCounter() {
            const el = document.getElementById('descCounter');
            if (!el || !editor) return;
            const count = editor.getText().length;
            el.textContent = `${Math.min(count, MAX_DESC)}/${MAX_DESC}`;
        }

        function updatePublishButton() {
            const title = (document.getElementById('titleInput')?.value || '').trim();
            const btn = document.getElementById('publishBtnBottom');
            if (!btn) return;
            btn.disabled = !(title && uploadedImages.length > 0);
        }

        function markAsChanged() {
            setSaveStatus('保存中...', '#e6a23c');
            hasUnsavedChanges = true;
            debounceAutoSave();
            updatePublishButton();
        }

        function debounceAutoSave() {
            clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(() => {
                autoSave();
            }, 800);
        }

        function autoSave() {
            const title = (document.getElementById('titleInput')?.value || '').trim();
            const category = document.querySelector('input[name="category"]:checked')?.value || '';
            const isAnonymous = false;
            const content = editor ? editor.getHtml() : '';
            const topics = Array.from(selectedTopics);
            const cache = { 
                title, category, content, topics, images: uploadedImages, draftId: currentDraftId, ts: Date.now(),
                vote: imageVoteData // ✅ 保存投票数据
            };
            try {
                localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
            } catch (e) {}
            setSaveStatus('已自动保存', '#67c23a');
            hasUnsavedChanges = false; // 自动保存成功后重置状态，与 post-editor.html 对齐
        }

        function tryRestoreCache() {
            try {
                const raw = localStorage.getItem(CACHE_KEY);
                if (!raw) return;
                const cache = JSON.parse(raw);
                if (!cache || typeof cache !== 'object') return;

                if (cache.title) {
                    const input = document.getElementById('titleInput');
                    if (input) input.value = cache.title;
                }
                if (cache.category) {
                    document.querySelectorAll('input[name="category"]').forEach((r) => {
                        if (r.value === cache.category) r.checked = true;
                    });
                }
                if (editor && cache.content) {
                    editor.setHtml(cache.content);
                }
                uploadedImages = Array.isArray(cache.images) ? cache.images : [];
                selectedTopics.clear();
                if (Array.isArray(cache.topics)) {
                    cache.topics.forEach((t) => selectedTopics.add(String(t)));
                }
                if (!currentDraftId && cache.draftId) currentDraftId = cache.draftId;

                // ✅ 恢复投票缓存
                if (cache.vote) {
                    imageVoteData = cache.vote;
                    console.log('✅ 已恢复草稿中的投票数据:', imageVoteData);
                    // 显示投票状态
                    const statusText = document.getElementById('voteStatusText');
                    if (statusText && imageVoteData) {
                        statusText.textContent = `✅ 已添加投票: ${imageVoteData.title}`;
                        statusText.style.display = 'block';
                    }
                }

                updateTitleCounter();
                updateDescCounter();
                renderUploadGrid();
                renderSelectedTopics();
                renderTopicSuggestions();
                updatePublishButton();
                showToast('已恢复草稿', 'info');
                hasUnsavedChanges = true;
            } catch (e) {}
        }

        function buildImagePostContent() {
            const descHtml = editor ? editor.getHtml() : '';
            const imagesHtml = uploadedImages
                .map((img) => `<p><img src="${escapeHtml(img.url)}" alt="${escapeHtml(img.alt || '')}" draggable="false"></p><p><br></p>`)
                .join('');
            const topicsHtml = Array.from(selectedTopics).length > 0
                ? `<p>${escapeHtml('#' + Array.from(selectedTopics).join(' #'))}</p><p><br></p>`
                : '';
            
            // 添加隐藏的元数据，用于草稿还原
            const category = document.querySelector('input[name="category"]:checked')?.value || '';
            const metaData = {
                version: '2',
                category: category,
                topics: Array.from(selectedTopics),
                images: uploadedImages,
                descHtml: descHtml
            };
            const metaHtml = `<div id="draft-meta" style="display:none;" data-meta='${JSON.stringify(metaData).replace(/'/g, "&#39;")}'></div>`;
            
            return `${topicsHtml}${descHtml}${imagesHtml}${metaHtml}`;
        }

        function hasContent() {
            const title = (document.getElementById('titleInput')?.value || '').trim();
            if (title) return true;
            if (uploadedImages.length > 0) return true;
            if (selectedTopics.size > 0) return true;
            const html = editor ? editor.getHtml() : '';
            // 排除默认的空段落
            return !!(html && html !== '<p><br></p>');
        }

        function isSameAsLastSavedDraft() {
            if (!lastSavedDraftSnapshot) return false;
            const title = (document.getElementById('titleInput')?.value || '').trim();
            const content = buildImagePostContent();
            
            // 比较标题和内容
            return title === lastSavedDraftSnapshot.title && content === lastSavedDraftSnapshot.content;
        }

        function goBack() {
            if (history.length > 1) {
                history.back();
            } else {
                window.location.href = '/posts.html';
            }
        }

        function openExitModal() {
            const modal = document.getElementById('exitModal');
            if (modal) modal.classList.add('open');
        }

        function closeExitModal() {
            const modal = document.getElementById('exitModal');
            if (modal) modal.classList.remove('open');
        }

        async function handleExit(saveToDraft) {
            closeExitModal();
            if (saveToDraft) {
                await saveToDrafts();
                // 等待一小会确保保存状态更新
                setTimeout(goBack, 500);
            } else {
                // 放弃保存，清除缓存
                try { localStorage.removeItem(CACHE_KEY); } catch (e) {}
                hasUnsavedChanges = false;
                goBack();
            }
        }

        function handleCancel() {
            // 如果没有任何内容，直接返回
            if (!hasContent()) {
                goBack();
                return;
            }
            
            // 如果内容与最后一次保存的草稿一致，直接返回
            if (isSameAsLastSavedDraft()) {
                goBack();
                return;
            }
            
            // 否则弹出退出确认框
            openExitModal();
        }

        async function goToDrafts() {
            if (hasContent() && hasUnsavedChanges && !isSameAsLastSavedDraft()) {
                try {
                    await saveToDrafts();
                } catch (e) {}
            }
            window.location.href = '/drafts.html';
        }

        async function saveToDrafts() {
            const title = (document.getElementById('titleInput')?.value || '').trim();
            const content = buildImagePostContent();

            if (!title && (!content || content === '<p><br></p>')) {
                showToast('没有可保存的内容', 'info');
                return;
            }

            try {
                const resp = await fetch('/api/drafts/save', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ id: currentDraftId, title, draftType: 'image', content })
                });
                const result = await resp.json();
                if (result.code === 200) {
                    currentDraftId = result.data.id;
                    lastSavedDraftSnapshot = { title, content };
                    showToast('已保存到草稿箱', 'success');
                    setSaveStatus('已保存到草稿箱', '#67c23a');
                    hasUnsavedChanges = false;
                } else {
                    showToast(result.message || '保存失败', 'error');
                }
            } catch (e) {
                showToast('保存失败，请检查网络连接', 'error');
            }
        }

        async function loadDraftFromServer(draftId) {
            try {
                const resp = await fetch(`/api/drafts/${draftId}`);
                const result = await resp.json();
                if (result.code !== 200) {
                    showToast(result.message || '加载草稿失败', 'error');
                    tryRestoreCache();
                    return;
                }

                const draft = result.data || {};
                currentDraftId = draft.id || null;

                const titleInput = document.getElementById('titleInput');
                if (titleInput) titleInput.value = draft.title || '';
                updateTitleCounter();

                const div = document.createElement('div');
                div.innerHTML = draft.content || '';

                // 尝试从隐藏元数据还原
                const metaEl = div.querySelector('#draft-meta');
                if (metaEl && metaEl.dataset.meta) {
                    try {
                        const meta = JSON.parse(metaEl.dataset.meta);
                        if (meta.version === '2') {
                            // 还原版块
                            if (meta.category) {
                                document.querySelectorAll('input[name="category"]').forEach((r) => {
                                    if (r.value === meta.category) r.checked = true;
                                });
                            }
                            // 还原话题
                            selectedTopics.clear();
                            if (Array.isArray(meta.topics)) {
                                meta.topics.forEach(t => selectedTopics.add(t));
                            }
                            // 还原图片
                            uploadedImages = Array.isArray(meta.images) ? meta.images : [];
                            // 还原描述内容
                            if (editor) editor.setHtml(meta.descHtml || '');
                            
                            finishLoadingDraft(draft);
                            return;
                        }
                    } catch (e) {
                        console.error('解析元数据失败，回退到旧版解析逻辑', e);
                    }
                }

                // 旧版解析逻辑（回退）
                const extractedImages = [];
                Array.from(div.querySelectorAll('img')).forEach((img) => {
                    const src = img.getAttribute('src');
                    if (src) extractedImages.push({ url: src, alt: img.getAttribute('alt') || '' });
                    const p = img.closest('p');
                    if (p && p.querySelectorAll('img').length === 1 && (p.textContent || '').trim() === '') {
                        const next = p.nextElementSibling;
                        p.remove();
                        if (next && next.tagName === 'P' && next.innerHTML.replace(/\s/g, '').toLowerCase() === '<br>') {
                            next.remove();
                        }
                    } else {
                        img.remove();
                    }
                });
                uploadedImages = extractedImages;

                selectedTopics.clear();
                const topicP = Array.from(div.querySelectorAll('p')).find((p) => {
                    const t = (p.textContent || '').trim();
                    if (!t.startsWith('#')) return false;
                    const tokens = t.split(/\s+/).filter(Boolean);
                    if (tokens.length === 0) return false;
                    return tokens.every((x) => x.startsWith('#'));
                });
                if (topicP) {
                    const tokens = (topicP.textContent || '').trim().split(/\s+/).filter(Boolean);
                    tokens.forEach((x) => {
                        const name = x.replace(/^#+/, '').trim();
                        if (name) selectedTopics.add(name);
                    });
                    const next = topicP.nextElementSibling;
                    topicP.remove();
                    if (next && next.tagName === 'P' && next.innerHTML.replace(/\s/g, '').toLowerCase() === '<br>') {
                        next.remove();
                    }
                }

                const descHtml = div.innerHTML || '';
                if (editor) editor.setHtml(descHtml && descHtml.trim() ? descHtml : '');
                
                finishLoadingDraft(draft);
            } catch (e) {
                showToast('加载草稿失败', 'error');
                tryRestoreCache();
            }
        }

        function finishLoadingDraft(draft) {
            updateDescCounter();
            renderUploadGrid();
            renderSelectedTopics();
            renderTopicSuggestions();
            updatePublishButton();

            lastSavedDraftSnapshot = { title: draft.title || '', content: draft.content || '' };
            setSaveStatus('已加载草稿', '#67c23a');
            hasUnsavedChanges = false;
            showToast('已加载草稿', 'info');
        }

        async function loadDraftOrCache() {
            const draftId = new URLSearchParams(window.location.search).get('draftId');
            if (draftId) {
                await loadDraftFromServer(draftId);
            } else {
                /* 从非草稿箱进入，不恢复缓存，保持空白编辑器 */
            }
        }

        function loadTopicHeatMap() {
            try {
                const raw = localStorage.getItem(TOPIC_HEAT_KEY);
                if (!raw) return {};
                const data = JSON.parse(raw);
                if (data && typeof data === 'object') return data;
                return {};
            } catch (e) {
                return {};
            }
        }

        function saveTopicHeatMap(map) {
            try {
                localStorage.setItem(TOPIC_HEAT_KEY, JSON.stringify(map));
            } catch (e) {}
        }

        function bumpTopicHeat(name, delta = 1) {
            const map = loadTopicHeatMap();
            const prev = Number(map[name] || 0);
            map[name] = prev + delta;
            saveTopicHeatMap(map);
        }

        function getSortedTopics() {
            const map = loadTopicHeatMap();
            const list = TOPIC_DEFAULTS.map((t) => ({
                name: t.name,
                heat: t.heat + Number(map[t.name] || 0)
            }));
            list.sort((a, b) => {
                if (b.heat !== a.heat) return b.heat - a.heat;
                return a.name.localeCompare(b.name, 'zh-CN');
            });
            return list;
        }

        function renderTopicSuggestions(overrideList) {
            const container = document.getElementById('topicSuggestions');
            if (!container) return;
            const list = overrideList || getSortedTopics();
            container.innerHTML = '';
            list.forEach((item) => {
                const name = item.name;
                const chip = document.createElement('button');
                chip.type = 'button';
                chip.className = 'chip' + (selectedTopics.has(name) ? ' active' : '');
                chip.textContent = name;
                chip.addEventListener('click', () => {
                    if (selectedTopics.has(name)) {
                        selectedTopics.delete(name);
                    } else {
                        selectedTopics.add(name);
                        bumpTopicHeat(name, 1);
                    }
                    renderSelectedTopics();
                    renderTopicSuggestions();
                    markAsChanged();
                });
                container.appendChild(chip);
            });
        }

        function renderSelectedTopics() {
            const container = document.getElementById('selectedTopics');
            if (!container) return;
            const list = Array.from(selectedTopics);
            if (list.length === 0) {
                container.style.display = 'none';
                container.innerHTML = '';
                return;
            }
            container.style.display = 'flex';
            container.innerHTML = '';
            list.forEach((name) => {
                const chip = document.createElement('button');
                chip.type = 'button';
                chip.className = 'chip active';
                chip.textContent = name;
                chip.addEventListener('click', () => {
                    selectedTopics.delete(name);
                    renderSelectedTopics();
                    renderTopicSuggestions();
                    markAsChanged();
                });
                container.appendChild(chip);
            });
        }

        function filterTopicSuggestions(keyword) {
            const key = (keyword || '').trim();
            
            // 检查是否以+开头（创建新话题）
            if (key.startsWith('+')) {
                const newTopicName = key.substring(1).trim();
                if (newTopicName.length > 0) {
                    showCreateTopicDialog(newTopicName);
                    return;
                }
            }
            
            const keyLower = key.toLowerCase();
            if (!keyLower) {
                renderTopicSuggestions();
                return;
            }
            const filtered = getSortedTopics().filter((t) => t.name.toLowerCase().includes(keyLower));
            renderTopicSuggestions(filtered);
        }

        function handleCreateTopicFromInput() {
            const topicSearch = document.getElementById('topicSearchInput');
            if (!topicSearch) return;
            
            const inputValue = topicSearch.value.trim();
            
            if (!inputValue) {
                showToast('请输入话题名称', 'error');
                return;
            }
            
            // 如果有+前缀，去掉它
            const topicName = inputValue.startsWith('+') ? inputValue.substring(1).trim() : inputValue;
            
            if (!topicName) {
                showToast('请输入有效的话题名称', 'error');
                return;
            }
            
            showCreateTopicDialog(topicName);
        }

        function showCreateTopicDialog(topicName) {
            if (selectedTopics.has(topicName)) {
                showToast(`话题“${topicName}”已存在`, 'info');
                return;
            }
            
            if (confirm(`是否创建新话题“${topicName}”？`)) {
                createNewTopic(topicName);
            }
        }

        async function createNewTopic(topicName) {
            try {
                const response = await fetch('/api/topics/get-or-create', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name: topicName })
                });
                
                const result = await response.json();
                
                if (result.code === 200) {
                    selectedTopics.add(topicName);
                    renderSelectedTopics();
                    renderTopicSuggestions();
                    markAsChanged();
                    showToast(`话题“${topicName}”创建成功`, 'success');
                    
                    // 清空搜索框
                    const topicSearch = document.getElementById('topicSearchInput');
                    if (topicSearch) {
                        topicSearch.value = '';
                        renderTopicSuggestions();
                    }
                } else {
                    showToast(result.message || '创建话题失败', 'error');
                }
            } catch (error) {
                console.error('创建话题失败:', error);
                showToast('创建话题失败', 'error');
            }
        }

        function renderUploadGrid() {
            const grid = document.getElementById('uploadGrid');
            if (!grid) return;
            grid.innerHTML = '';

            uploadedImages.forEach((item, idx) => {
                const wrap = document.createElement('div');
                wrap.className = 'thumb';

                const img = document.createElement('img');
                img.src = item.url;
                img.alt = item.alt || `图片${idx + 1}`;
                img.draggable = false;
                img.addEventListener('click', () => openImageViewer(item.url));
                img.addEventListener('contextmenu', (e) => e.preventDefault());

                const actions = document.createElement('div');
                actions.className = 'thumb-actions';

                const del = document.createElement('button');
                del.type = 'button';
                del.className = 'icon-btn';
                del.textContent = '×';
                del.setAttribute('aria-label', '删除图片');
                del.addEventListener('click', (e) => {
                    e.stopPropagation();
                    uploadedImages.splice(idx, 1);
                    renderUploadGrid();
                    markAsChanged();
                });

                actions.appendChild(del);
                wrap.appendChild(img);
                wrap.appendChild(actions);
                grid.appendChild(wrap);
            });

            if (uploadedImages.length < MAX_IMAGES) {
                const add = document.createElement('button');
                add.type = 'button';
                add.className = 'upload-tile';
                add.setAttribute('aria-label', '添加图片');
                add.innerHTML = `
                    <div class="upload-hint">
                        <div class="upload-plus">+</div>
                        <div style="font-size: 14px; font-weight: 700; color:#303133;">点击添加图片</div>
                        <div class="subtext">最多可上传 ${MAX_IMAGES} 张</div>
                    </div>
                `;
                add.addEventListener('click', () => {
                    document.getElementById('imageInput')?.click();
                });
                grid.appendChild(add);
            }
            updatePublishButton();
        }

        async function uploadFiles(files) {
            if (!files || files.length === 0) return;
            const available = MAX_IMAGES - uploadedImages.length;
            const list = Array.from(files).slice(0, Math.max(0, available));
            if (list.length === 0) {
                showToast(`最多只能上传 ${MAX_IMAGES} 张图片`, 'info');
                return;
            }

            for (const file of list) {
                try {
                    const form = new FormData();
                    form.append('file', file);
                    const resp = await fetch('/api/upload/image', { method: 'POST', body: form });
                    const result = await resp.json();
                    if (result.code === 200 && result.data && result.data.url) {
                        uploadedImages.push({ url: result.data.url, alt: result.data.alt || file.name });
                        renderUploadGrid();
                        markAsChanged();
                    } else {
                        showToast(result.message || '图片上传失败', 'error');
                    }
                } catch (e) {
                    showToast('图片上传失败', 'error');
                }
            }
        }

        function openPreviewModal() {
            const modal = document.getElementById('previewModal');
            if (!modal) return;
            renderPreview();
            modal.classList.add('open');
        }

        function closePreviewModal() {
            const modal = document.getElementById('previewModal');
            if (!modal) return;
            modal.classList.remove('open');
        }

        function renderPreview() {
            const title = (document.getElementById('titleInput')?.value || '').trim();
            const category = document.querySelector('input[name="category"]:checked')?.value || '';

            const titleEl = document.getElementById('previewPostTitle');
            const metaEl = document.getElementById('previewMeta');
            const contentEl = document.getElementById('previewContent');
            const imagesEl = document.getElementById('previewImages');

            if (titleEl) titleEl.textContent = title || '未填写标题';

            if (metaEl) {
                const topics = Array.from(selectedTopics);
                metaEl.innerHTML = '';
                const c = document.createElement('div');
                c.textContent = `版块：${category || '未选择'}`;
                metaEl.appendChild(c);
                if (topics.length > 0) {
                    const t = document.createElement('div');
                    t.textContent = `话题：${topics.join(' / ')}`;
                    metaEl.appendChild(t);
                }
            }

            if (contentEl) {
                contentEl.innerHTML = editor ? editor.getHtml() : '';
            }

            if (imagesEl) {
                imagesEl.innerHTML = '';
                uploadedImages.forEach((img) => {
                    const el = document.createElement('img');
                    el.src = img.url;
                    el.alt = img.alt || '图片';
                    el.draggable = false;
                    el.addEventListener('click', () => openImageViewer(img.url));
                    el.addEventListener('contextmenu', (e) => e.preventDefault());
                    imagesEl.appendChild(el);
                });
            }
        }

        function openImageViewer(src) {
            const viewer = document.getElementById('imageViewer');
            const img = document.getElementById('imageViewerImg');
            if (!viewer || !img) return;
            const safe = String(src || '').trim();
            if (!safe) return;
            img.src = safe;
            viewer.classList.add('open');
        }

        function closeImageViewer() {
            const viewer = document.getElementById('imageViewer');
            const img = document.getElementById('imageViewerImg');
            if (!viewer || !img) return;
            viewer.classList.remove('open');
            img.removeAttribute('src');
        }

        async function publishImagePost() {
            if (isSubmitting) return;

            const title = (document.getElementById('titleInput')?.value || '').trim();
            const category = document.querySelector('input[name="category"]:checked')?.value || '';
            const isAnonymous = false;

            if (!title) {
                showToast('请输入帖子标题', 'error');
                return;
            }
            if (uploadedImages.length === 0) {
                showToast('请至少上传 1 张图片', 'error');
                return;
            }

            // ✅ 使用全局变量中的投票数据
            let voteData = imageVoteData;

            const content = buildImagePostContent();
            
            // 调试日志
            console.log('📊 发布图片帖子 - 投票数据:', voteData);
            if (voteData) {
                console.log('✅ 投票数据已准备:', JSON.stringify(voteData, null, 2));
            } else {
                console.log('ℹ️ 此帖子不包含投票');
            }
            
            // 开启发布状态，显示加载遮罩
            isSubmitting = true;
            const loadingOverlay = document.getElementById('loadingOverlay');
            if (loadingOverlay) loadingOverlay.style.display = 'flex';

            try {
                // 发布帖子
                const requestData = {
                    title, 
                    content, 
                    category, 
                    isAnonymous,
                    postType: 'image',
                    topicNames: Array.from(selectedTopics),
                    vote: voteData // 包含投票信息
                };
                
                console.log('📤 发送请求数据:', JSON.stringify(requestData, null, 2));
                
                const resp = await fetch('/api/posts/publish', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });
                const result = await resp.json();
                
                if (result.code === 200) {
                    showToast('发布成功！', 'success');
                    
                    // 彻底关闭浏览器退出提示 (最高优先级)
                    window.onbeforeunload = null;
                    isSubmitting = true;
                    
                    // 清除缓存和状态 (完全复刻 post-editor.html 逻辑)
                    try { localStorage.removeItem(CACHE_KEY); } catch (e) {}
                    const draftIdToDelete = currentDraftId;
                    
                    hasUnsavedChanges = false;
                    currentDraftId = null;
                    lastSavedDraftSnapshot = null;
                    imageVoteData = null; // ✅ 清空投票数据
                    
                    // 隐藏投票状态文本
                    const statusText = document.getElementById('voteStatusText');
                    if (statusText) statusText.style.display = 'none';

                    // 异步删除草稿，不阻塞跳转
                    if (draftIdToDelete) {
                        fetch(`/api/drafts/${draftIdToDelete}`, { method: 'DELETE' }).catch(() => {});
                    }
                    
                    // 跳转至列表页
                    setTimeout(() => { window.location.href = '/posts.html'; }, 1500);
                } else {
                    isSubmitting = false;
                    if (loadingOverlay) loadingOverlay.style.display = 'none';
                    showToast('发布失败：' + (result.message || '未知错误'), 'error');
                }
            } catch (e) {
                isSubmitting = false;
                if (loadingOverlay) loadingOverlay.style.display = 'none';
                console.error('发布帖子失败:', e);
                showToast('发布失败，请检查网络连接', 'error');
            }
        }

        function initEditor() {
            const { createEditor, createToolbar } = window.wangEditor;

            const editorConfig = {
                placeholder: '请输入图片介绍...',
                maxLength: MAX_DESC,
                onMaxLength() {
                    showToast(`图片介绍最多 ${MAX_DESC} 字`, 'info');
                },
                onChange() {
                    updateDescCounter();
                    markAsChanged();
                },
                hoverbarKeys: {
                    image: ['deleteImage']
                }
            };

            editor = createEditor({
                selector: '#editor-container',
                html: '',
                config: editorConfig,
                mode: 'default'
            });

            const toolbarConfig = {
                excludeKeys: ['uploadImage']
            };

            createToolbar({
                editor,
                selector: '#toolbar-container',
                config: toolbarConfig,
                mode: 'default'
            });
        }

        function initInteractions() {
            const title = document.getElementById('titleInput');
            const topicSearch = document.getElementById('topicSearchInput');
            const imageInput = document.getElementById('imageInput');
            const previewModal = document.getElementById('previewModal');

            if (title) {
                title.addEventListener('input', () => {
                    updateTitleCounter();
                    markAsChanged();
                });
            }

            document.querySelectorAll('input[name="category"]').forEach((radio) => {
                radio.addEventListener('change', () => {
                    const selectedCategory = document.querySelector('input[name="category"]:checked')?.value;
                    if (selectedCategory === '交友') {
                        if (hasUnsavedChanges) {
                            autoSave();
                        }
                        window.location.href = '/dating-post.html';
                        return;
                    }
                    markAsChanged();
                });
            });

            const categoryGroup = document.getElementById('categoryGroup');
            if (categoryGroup) {
                categoryGroup.addEventListener('click', (e) => {
                    const label = e.target.closest('.radio-option');
                    if (!label) return;
                    
                    const radio = label.querySelector('input[type="radio"]');
                    if (!radio) return;
                    
                    if (radio.value === '交友' && !radio.checked) {
                        radio.checked = true;
                        if (hasUnsavedChanges) {
                            autoSave();
                        }
                        setTimeout(() => {
                            window.location.href = '/dating-post.html';
                        }, 50);
                    }
                });
            }

            if (topicSearch) {
                topicSearch.addEventListener('input', () => {
                    filterTopicSuggestions(topicSearch.value);
                });
            }

            if (imageInput) {
                imageInput.addEventListener('change', async (e) => {
                    const files = e.target.files;
                    await uploadFiles(files);
                    e.target.value = '';
                });
            }

            document.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closePreviewModal();
                    closeImageViewer();
                    closeExitModal();
                }
            });

            document.addEventListener('gesturestart', (e) => e.preventDefault(), { passive: false });
            document.addEventListener('gesturechange', (e) => e.preventDefault(), { passive: false });
            document.addEventListener('gestureend', (e) => e.preventDefault(), { passive: false });

            document.addEventListener('touchmove', (e) => {
                if (e.touches && e.touches.length > 1) {
                    e.preventDefault();
                }
            }, { passive: false });

            document.addEventListener('touchend', (e) => {
                const now = Date.now();
                if (now - lastTouchEndTs <= 280) {
                    e.preventDefault();
                }
                lastTouchEndTs = now;
            }, { passive: false });

            if (previewModal) {
                previewModal.addEventListener('click', (e) => {
                    if (e.target === previewModal) {
                        closePreviewModal();
                    }
                });
            }
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();
            initEditor();
            updateTitleCounter();
            updateDescCounter();
            renderUploadGrid();
            renderSelectedTopics();
            renderTopicSuggestions();
            initInteractions();
            await loadDraftOrCache();
            setSaveStatus('已自动保存', '#67c23a');
        });

        // 监听页面关闭/刷新事件
        window.onbeforeunload = function(e) {
            if (isSubmitting || !hasUnsavedChanges) return undefined;
            const msg = '您有未保存的内容，确定离开吗？';
            (e || window.event).returnValue = msg;
            return msg;
        };
    </script>
