<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>编写帖子</title>
    <link href="https://cdn.jsdelivr.net/npm/@wangeditor/editor@5.1.23/dist/css/style.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            padding: 0;
        }

        .page-topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: #ffffff;
            border-bottom: 1px solid #ebeef5;
        }

        .topbar-inner {
            max-width: 1200px;
            margin: 0 auto;
            height: 56px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            column-gap: 12px;
        }

        .topbar-title {
            font-size: 18px;
            font-weight: 700;
            color: #303133;
        }

        .topbar-center {
            text-align: center;
            font-size: 13px;
            color: #909399;
            user-select: none;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: flex-end;
        }

        .topbar-link {
            padding: 8px 10px;
            border: 1px solid transparent;
            border-radius: 8px;
            background: transparent;
            color: #606266;
            cursor: pointer;
            font-size: 14px;
        }

        .topbar-link:hover {
            background: #f5f7fa;
            color: #409eff;
        }

        .topbar-btn {
            padding: 8px 14px;
            border: 1px solid #dcdfe6;
            border-radius: 8px;
            background: #ffffff;
            color: #606266;
            cursor: pointer;
            font-size: 14px;
        }

        .topbar-btn:hover {
            border-color: #c6e2ff;
            background: #ecf5ff;
            color: #409eff;
        }

        .topbar-primary {
            padding: 8px 14px;
            border: 1px solid #409eff;
            border-radius: 8px;
            background: #409eff;
            color: #ffffff;
            cursor: pointer;
            font-size: 14px;
        }

        .topbar-primary:hover {
            background: #3a8ee6;
            border-color: #3a8ee6;
        }

        .page-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 20px 40px;
        }

        .form-card {
            background-color: #fff;
            border: 1px solid #ebeef5;
            border-radius: 12px;
            padding: 26px 26px 18px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.04);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e4e7ed;
        }

        .user-bar {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            color: white;
            margin-bottom: 20px;
        }

        .user-bar span {
            font-size: 14px;
            font-weight: 500;
        }

        .btn-logout,
        .btn-home {
            padding: 6px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-logout {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-logout:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .btn-home {
            background-color: white;
            color: #667eea;
        }

        .btn-home:hover {
            background-color: #f5f7fa;
        }

        h1 {
            color: #303133;
            font-size: 24px;
        }

        .header-buttons {
            display: flex;
            gap: 10px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn-draft {
            background-color: #909399;
            color: white;
        }

        .btn-draft:hover {
            background-color: #7d7e80;
        }

        .btn-publish {
            background-color: #409eff;
            color: white;
        }

        .btn-publish:hover {
            background-color: #3a8ee6;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #606266;
            font-weight: 500;
        }

        .form-row {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 24px;
        }

        .form-label {
            width: 86px;
            flex: 0 0 auto;
            padding-top: 10px;
            color: #303133;
            font-weight: 600;
            font-size: 14px;
        }

        .form-control {
            flex: 1 1 auto;
        }

        .input-with-counter {
            position: relative;
        }

        .text-input {
            width: 100%;
            height: 44px;
            padding: 0 14px;
            border: 1px solid #dcdfe6;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
            background-color: white;
        }

        .text-input:focus {
            outline: none;
            border-color: #409eff;
        }

        .counter {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #c0c4cc;
            font-size: 12px;
            pointer-events: none;
        }

        #editor-wrapper {
            border: 1px solid #dcdfe6;
            border-radius: 8px;
            overflow: hidden;
            background: #ffffff;
        }

        .editor-toolbar-row {
            display: flex;
            align-items: center;
            gap: 8px;
            padding-right: 8px;
            border-bottom: 1px solid #dcdfe6;
        }

        #toolbar-container {
            flex: 1 1 auto;
            min-width: 0;
            border-bottom: none;
        }

        .editor-extra-tools {
            display: flex;
            align-items: center;
            gap: 6px;
            flex: 0 0 auto;
        }

        .editor-tool-btn {
            height: 32px;
            padding: 0 10px;
            border: 1px solid #dcdfe6;
            border-radius: 8px;
            background: #ffffff;
            color: #606266;
            cursor: pointer;
            font-size: 13px;
            user-select: none;
        }

        .editor-tool-btn:hover {
            border-color: #c6e2ff;
            background: #ecf5ff;
            color: #409eff;
        }

        #editor-container {
            height: 520px;
        }

        .w-e-text-container img,
        .w-e-text-container [data-slate-editor] img {
            display: block;
            max-width: 70%;
            max-height: 420px;
            width: auto;
            height: auto;
            margin: 12px auto;
            border-radius: 8px;
            touch-action: manipulation;
            -webkit-touch-callout: none;
            user-select: none;
        }

        @media (max-width: 768px) {
            .w-e-text-container img,
            .w-e-text-container [data-slate-editor] img {
                max-width: 100%;
            }
        }

        .vote-block {
            border: 1px solid #ebeef5;
            border-radius: 10px;
            background: #ffffff;
            padding: 12px 14px;
            margin: 12px 0;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.04);
        }

        .vote-block-title {
            font-size: 14px;
            font-weight: 700;
            color: #303133;
            margin-bottom: 6px;
        }

        .vote-block-meta {
            font-size: 12px;
            color: #909399;
            margin-bottom: 10px;
        }

        .vote-block-options {
            list-style: none;
            padding: 0;
            margin: 0;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .vote-block-options li {
            font-size: 13px;
            color: #606266;
            background: #f5f7fa;
            border-radius: 8px;
            padding: 8px 10px;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0 0;
        }

        .auto-save-status {
            color: #67c23a;
            font-size: 13px;
        }

        .word-count {
            color: #909399;
            font-size: 13px;
        }

        .radio-group {
            display: flex;
            align-items: center;
            gap: 18px;
            flex-wrap: wrap;
            padding-top: 6px;
        }

        .radio-option {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: #606266;
            font-size: 14px;
            cursor: pointer;
            user-select: none;
        }

        .radio-option input {
            width: 16px;
            height: 16px;
            accent-color: #409eff;
            cursor: pointer;
        }

        .subtext {
            color: #909399;
            font-size: 12px;
            line-height: 1.4;
        }

        .topic-search {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .topic-search-input {
            flex: 1 1 auto;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid #dcdfe6;
            background: #ffffff;
            color: #606266;
            font-size: 13px;
            cursor: pointer;
            user-select: none;
            transition: all 0.15s ease;
        }

        .chip:hover {
            border-color: #c6e2ff;
            background: #ecf5ff;
            color: #409eff;
        }

        .chip.active {
            border-color: #409eff;
            background: #ecf5ff;
            color: #409eff;
        }

        .select-input {
            width: 100%;
            height: 44px;
            padding: 0 14px;
            border: 1px solid #dcdfe6;
            border-radius: 8px;
            font-size: 14px;
            background-color: white;
            outline: none;
            cursor: pointer;
        }

        .select-input:focus {
            border-color: #409eff;
        }

        .switch-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 10px 0;
            border-top: 1px solid #f2f3f5;
        }

        .switch-left {
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .switch-title {
            color: #303133;
            font-size: 14px;
            font-weight: 600;
        }

        .switch-desc a {
            color: #409eff;
            text-decoration: none;
        }

        .switch {
            position: relative;
            width: 44px;
            height: 24px;
            flex: 0 0 auto;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .switch-track {
            position: absolute;
            inset: 0;
            background: #dcdfe6;
            border-radius: 999px;
            cursor: pointer;
            transition: background 0.15s ease;
        }

        .switch-thumb {
            position: absolute;
            left: 3px;
            top: 3px;
            width: 18px;
            height: 18px;
            background: #ffffff;
            border-radius: 50%;
            transition: transform 0.15s ease;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.15);
            cursor: pointer;
        }

        .switch input:checked + .switch-track {
            background: #409eff;
        }

        .switch input:checked ~ .switch-thumb {
            transform: translateX(20px);
        }

        .bottom-actions {
            display: flex;
            justify-content: center;
            padding-top: 18px;
        }

        .publish-bottom-btn {
            width: 220px;
            height: 44px;
            border: 1px solid #409eff;
            border-radius: 8px;
            background: #409eff;
            color: #ffffff;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .publish-bottom-btn:hover {
            background: #3a8ee6;
            border-color: #3a8ee6;
        }

        /* 提示框样式 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: #fff;
            margin: 15% auto;
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #303133;
        }

        .modal-body {
            margin-bottom: 20px;
            color: #606266;
            line-height: 1.6;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn-cancel {
            background-color: #ffffff;
            color: #606266;
            border: 1px solid #dcdfe6;
        }

        .btn-cancel:hover {
            color: #409eff;
            border-color: #c6e2ff;
            background-color: #ecf5ff;
        }

        .btn-back {
            background-color: #ffffff;
            color: #606266;
            border: 1px solid #dcdfe6;
        }

        .btn-back:hover {
            color: #f56c6c;
            border-color: #fbc4c4;
            background-color: #fef0f0;
        }

        .btn-confirm {
            background-color: #409eff;
            color: white;
        }

        .btn-confirm:hover {
            background-color: #3a8ee6;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 4px;
            color: white;
            font-size: 14px;
            z-index: 2000;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast-success {
            background-color: #67c23a;
        }

        .toast-info {
            background-color: #409eff;
        }

        .vote-modal .modal-content {
            margin: 8% auto;
            max-width: 980px;
            padding: 0;
            border-radius: 12px;
        }

        .vote-modal-header {
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 20px;
            border-bottom: 1px solid #ebeef5;
        }

        .vote-modal-title {
            font-size: 18px;
            font-weight: 800;
            color: #303133;
        }

        .vote-modal-close {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid transparent;
            background: transparent;
            cursor: pointer;
            color: #909399;
            font-size: 20px;
            line-height: 1;
        }

        .vote-modal-close:hover {
            border-color: #ebeef5;
            background: #f5f7fa;
            color: #606266;
        }

        .vote-modal-body {
            padding: 22px 22px 10px;
        }

        .vote-form {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .vote-row {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .vote-label {
            width: 86px;
            flex: 0 0 auto;
            color: #606266;
            font-size: 14px;
        }

        .vote-field {
            flex: 1 1 auto;
            min-width: 0;
        }

        .vote-input-wrap {
            position: relative;
        }

        .vote-counter {
            position: absolute;
            right: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: #c0c4cc;
            font-size: 12px;
            pointer-events: none;
        }

        .vote-date {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .vote-date input[type="date"] {
            width: 320px;
            max-width: 100%;
        }

        .vote-options-box {
            border: 1px solid #ebeef5;
            border-radius: 12px;
            padding: 18px;
            background: #ffffff;
        }

        .vote-options-title {
            font-size: 18px;
            font-weight: 800;
            color: #303133;
            margin-bottom: 14px;
        }

        .vote-option-row {
            display: flex;
            align-items: center;
            gap: 16px;
            padding: 14px 0;
        }

        .vote-option-row + .vote-option-row {
            border-top: 1px solid #f2f3f5;
        }

        .vote-option-label {
            width: 86px;
            flex: 0 0 auto;
            color: #606266;
            font-size: 14px;
        }

        .vote-option-field {
            flex: 1 1 auto;
            min-width: 0;
        }

        .vote-add-btn {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid #dcdfe6;
            background: #ffffff;
            cursor: pointer;
            color: #909399;
            font-size: 22px;
            line-height: 1;
            flex: 0 0 auto;
        }

        .vote-add-btn:hover {
            border-color: #c6e2ff;
            background: #ecf5ff;
            color: #409eff;
        }

        .vote-footer {
            padding: 16px 22px 22px;
            display: flex;
            justify-content: center;
        }

        .vote-save-btn {
            width: 220px;
            height: 44px;
            border: 1px solid #409eff;
            border-radius: 8px;
            background: #409eff;
            color: #ffffff;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .vote-save-btn:hover {
            background: #3a8ee6;
            border-color: #3a8ee6;
        }

        .image-viewer {
            position: fixed;
            inset: 0;
            z-index: 3000;
            background: rgba(0, 0, 0, 0.75);
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .image-viewer.open {
            display: flex;
        }

        .image-viewer img {
            max-width: 100%;
            max-height: 100%;
            border-radius: 10px;
            background: #ffffff;
        }

        .mention-popup { position:fixed; background:#fff; border:1px solid #e8e8e8; border-radius:8px; box-shadow:0 4px 16px rgba(0,0,0,.15); width:320px; max-height:400px; z-index:1000; overflow:hidden; }
        .mention-popup-header { padding:12px; border-bottom:1px solid #f0f0f0; }
        .mention-popup-title { display:block; font-size:14px; font-weight:600; color:#333; margin-bottom:8px; }
        .mention-popup-search { width:100%; padding:8px 12px; border:1px solid #ddd; border-radius:4px; font-size:13px; outline:none; }
        .mention-popup-search:focus { border-color:#409eff; }
        .mention-popup-list { max-height:320px; overflow-y:auto; }
        .mention-popup-item { display:flex; align-items:center; gap:10px; padding:10px 12px; cursor:pointer; }
        .mention-popup-item:hover, .mention-popup-item.active { background:#f0f2ff; }
        .mention-popup-item.is-self { opacity:.5; cursor:not-allowed; }
        .mention-popup-avatar { width:36px; height:36px; border-radius:50%; object-fit:cover; flex-shrink:0; }
        .mention-popup-avatar-default { background:linear-gradient(135deg,#409eff,#764ba2); color:#fff; display:flex; align-items:center; justify-content:center; font-weight:600; font-size:16px; }
        .mention-popup-name { font-size:14px; color:#333; flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .mention-popup-self { font-size:11px; color:#999; background:#f5f5f5; padding:1px 6px; border-radius:8px; }
        .mention-popup-tip { padding:20px; text-align:center; color:#999; font-size:13px; }
        .mention-tag { color:#409eff; background:#ecf5ff; padding:1px 4px; border-radius:3px; cursor:pointer; font-weight:500; }
        .mention-tag:hover { background:#d9ecff; }
    </style>
</head>
<body>
    <div class="page-topbar">
        <div class="topbar-inner">
            <div class="topbar-title">发布帖子</div>
            <div class="topbar-center"><span id="top-save-status">已自动保存</span></div>
            <div class="topbar-actions">
                <button class="topbar-link" onclick="saveToDrafts()">保存草稿</button>
                <button class="topbar-link" onclick="goToDrafts()">草稿箱</button>
                <button class="topbar-btn" onclick="handleCancel()">取消</button>
            </div>
        </div>
    </div>

    <div class="page-content">
        <div class="form-card">
            <div class="form-row">
                <div class="form-label">标题：</div>
                <div class="form-control">
                    <div class="input-with-counter">
                        <input type="text" id="post-title" class="text-input" placeholder="标题(必填)" maxlength="30">
                        <div class="counter" id="title-counter">0/30</div>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-label">内容：</div>
                <div class="form-control">
                    <div id="editor-wrapper">
                        <div class="editor-toolbar-row">
                            <div id="toolbar-container"></div>
                            <div class="editor-extra-tools">
                                <button type="button" class="editor-tool-btn" onclick="openMentionPopup()">@ 提及</button>
                                <button type="button" class="editor-tool-btn" onclick="openVoteModal()">📊 投票</button>
                            </div>
                        </div>
                        <div id="editor-container"></div>
                    </div>
                    <div class="status-bar">
                        <span class="auto-save-status" id="save-status">已自动保存</span>
                        <span class="word-count" id="content-counter">0/30000</span>
                    </div>
                </div>
            </div>

            <div class="form-row" style="margin-bottom: 18px;">
                <div class="form-label">发布版块：</div>
                <div class="form-control">
                    <div class="radio-group" id="category-group">
                        <label class="radio-option">
                            <input type="radio" name="post-category" value="交友">
                            交友
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="post-category" value="二手">
                            二手
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="post-category" value="失物招领">
                            失物招领
                        </label>
                        <label class="radio-option">
                            <input type="radio" name="post-category" value="闲聊" checked>
                            闲聊
                        </label>
                    </div>
                </div>
            </div>

            <div class="form-row" style="margin-top:-8px;">
                <div class="form-label">匿名发布：</div>
                <div class="form-control">
                    <label class="radio-option">
                        <input type="checkbox" id="anonymous-flag">
                        匿名发帖（二手分区不可匿名）
                    </label>
                </div>
            </div>

            <div class="form-row">
                <div class="form-label">选择话题：</div>
                <div class="form-control">
                    <div class="subtext" style="margin-bottom: 10px;">选择相关角色、内容分类，获得更多浏览</div>
                    <div class="topic-search">
                        <input type="text" id="topic-search-input" class="text-input topic-search-input" placeholder="输入话题名称搜索，+前缀创建新话题">
                    </div>
                    <div class="chips" id="selected-topics" style="display: none; margin-bottom: 12px;"></div>
                    <div class="subtext" style="margin-bottom: 8px;">推荐话题（最多5个）</div>
                    <div class="chips" id="topic-suggestions"></div>
                </div>
            </div>

            <div class="bottom-actions">
                <button class="publish-bottom-btn" onclick="publishPost()">发布</button>
            </div>
        </div>
    </div>

    <!-- 退出确认对话框 -->
    <div id="exit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">提示</div>
            <div class="modal-body">
                您有未保存的内容，是否保存到草稿箱？
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel" onclick="handleExit(false)">否</button>
                <button class="btn btn-confirm" onclick="handleExit(true)">是</button>
            </div>
        </div>
    </div>

    <!-- 取消确认对话框 -->
    <div id="cancel-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">提示</div>
            <div class="modal-body">
                检测到您有未发表的内容，是否保存到草稿箱？
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel" onclick="handleCancelConfirm(false)">否</button>
                <button class="btn btn-confirm" onclick="handleCancelConfirm(true)">是</button>
            </div>
        </div>
    </div>

    <div id="vote-modal" class="modal vote-modal">
        <div class="modal-content">
            <div class="vote-modal-header">
                <div class="vote-modal-title">创建投票</div>
                <button class="vote-modal-close" onclick="closeVoteModal()" aria-label="关闭">×</button>
            </div>
            <div class="vote-modal-body">
                <div class="vote-form">
                    <div class="vote-row">
                        <div class="vote-label">投票名称</div>
                        <div class="vote-field">
                            <div class="vote-input-wrap">
                                <input type="text" id="vote-title" class="text-input" placeholder="" maxlength="30">
                                <div class="vote-counter" id="vote-title-counter">0/30</div>
                            </div>
                        </div>
                    </div>
                    <div class="vote-row">
                        <div class="vote-label">截止时间</div>
                        <div class="vote-field vote-date">
                            <input type="datetime-local" id="vote-deadline" class="text-input">
                        </div>
                    </div>
                    <div class="vote-options-box">
                        <div class="vote-options-title">设置选项</div>
                        <div id="vote-options"></div>
                        <div class="vote-option-row">
                            <div class="vote-option-label">可同时选择</div>
                            <div class="vote-option-field">
                                <select id="vote-max-choices" class="select-input"></select>
                            </div>
                            <button class="vote-add-btn" type="button" onclick="addVoteOption()" aria-label="添加选项">+</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="vote-footer">
                <button class="vote-save-btn" type="button" onclick="saveVote()">保存投票</button>
            </div>
        </div>
    </div>

    <div class="image-viewer" id="imageViewer" onclick="closeImageViewer()">
        <img id="imageViewerImg" alt="">
    </div>

    <!-- 提示信息 -->
    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@wangeditor/editor@5.1.23/dist/index.js"></script>
    <script src="/js/mention.js"></script>
    <script src="/js/auth.js"></script>
    
    <script>
        let editor;
        let autoSaveTimer;
        const CACHE_KEY = 'post_editor_cache';
        const DRAFTS_KEY = 'post_drafts';
        let hasUnsavedChanges = false;
        let isSubmitting = false; // 正在提交标志
        let currentDraftId = null; // 当前编辑的草稿ID
        let lastSavedDraftSnapshot = null; // 最后一次保存到草稿箱的内容快照
        let postVoteData = null; // 存储当前帖子的投票数据（独立于编辑器内容）

        // 页面加载时检查登录状态并初始化用户信息
        window.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();
            await initUserBar();
        });

        // @提及弹窗
        let mentionPopup = null;

        function openMentionPopup() {
            if (!mentionPopup && typeof MentionUtils !== 'undefined') {
                mentionPopup = new MentionUtils.MentionPopup({
                    onSelect: function(user) {
                        if (!editor) return;
                        var mentionText = '@[uid:' + user.id + ']';
                        editor.insertText(mentionText + ' ');
                    }
                });
            }
            if (!mentionPopup) return;
            var toolbar = document.getElementById('toolbar-container');
            var rect = toolbar ? toolbar.getBoundingClientRect() : { right: 400, bottom: 200 };
            mentionPopup.open(rect.right - 340, rect.bottom + 10);
        }

        // 初始化编辑器
        function initEditor() {
            const { createEditor, createToolbar } = window.wangEditor;

            const editorConfig = {
                placeholder: '开始编写你的帖子...',
                onChange(editor) {
                    updateWordCount();
                    updateTitleCount();
                    markAsChanged();
                    debouncedAutoSave();
                },
                hoverbarKeys: {
                    image: ['deleteImage']
                },
                handleKeyDown(editor, event) {
                    if (event.key === '@') {
                        setTimeout(() => openMentionPopup(), 0);
                    }
                },
                MENU_CONF: {
                    uploadImage: {
                        server: '/api/upload/image',
                        fieldName: 'file',
                        maxFileSize: 5 * 1024 * 1024,
                        allowedFileTypes: ['image/*'],
                        customInsert(res, insertFn) {
                            if (res.code === 200) {
                                insertImageAtEnd(res.data.url, res.data.alt || '');
                                showToast('图片上传成功', 'success');
                            } else {
                                alert(res.message || '图片上传失败');
                            }
                        },
                        onError(file, err, res) {
                            console.error('图片上传错误:', err, res);
                            alert('图片上传失败：' + (res?.message || err));
                        }
                    }
                }
            };

            editor = createEditor({
                selector: '#editor-container',
                html: '',
                config: editorConfig,
                mode: 'default'
            });

            const toolbarConfig = {};

            const toolbar = createToolbar({
                editor,
                selector: '#toolbar-container',
                config: toolbarConfig,
                mode: 'default'
            });

            initFormEvents();
            updateTitleCount();
            updateWordCount();
            setSaveStatus('已自动保存', '#67c23a');
            initEditorImageBehaviors();

            // 加载缓存内容或草稿
            loadDraftOrCache();
        }

        function initFormEvents() {
            const titleInput = document.getElementById('post-title');
            if (titleInput) {
                titleInput.addEventListener('input', () => {
                    updateTitleCount();
                    markAsChanged();
                    debouncedAutoSave();
                });
            }

            document.querySelectorAll('input[name="post-category"]').forEach((radio) => {
                radio.addEventListener('change', () => {
                    const selectedCategory = document.querySelector('input[name="post-category"]:checked')?.value;
                    if (selectedCategory === '交友') {
                        if (hasUnsavedChanges) {
                            autoSave();
                        }
                        window.location.href = '/dating-post.html';
                        return;
                    }
                    markAsChanged();
                    debouncedAutoSave();
                });
            });

            const categoryGroup = document.getElementById('category-group');
            if (categoryGroup) {
                categoryGroup.addEventListener('click', (e) => {
                    const label = e.target.closest('.radio-option');
                    if (!label) return;
                    
                    const radio = label.querySelector('input[type="radio"]');
                    if (!radio) return;
                    
                    if (radio.value === '交友' && !radio.checked) {
                        radio.checked = true;
                        if (hasUnsavedChanges) {
                            autoSave();
                        }
                        setTimeout(() => {
                            window.location.href = '/dating-post.html';
                        }, 50);
                    }
                });
            }

            const topicSearch = document.getElementById('topic-search-input');
            if (topicSearch) {
                // 添加防抖定时器
                let topicSearchTimer = null;
                
                topicSearch.addEventListener('input', () => {
                    const value = topicSearch.value.trim();
                    
                    // 搜索话题模式（带防抖）
                    clearTimeout(topicSearchTimer);
                    topicSearchTimer = setTimeout(() => {
                        filterTopicSuggestions(value);
                    }, 300);
                });
                
                // 回车键处理
                topicSearch.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        const value = topicSearch.value.trim();
                        
                        // 检查是否以#开头（创建新话题）
                        if (value.startsWith('#')) {
                            const newTopicName = value.substring(1).trim();
                            if (newTopicName.length > 0) {
                                showCreateTopicDialog(newTopicName);
                            }
                        } else if (value.length > 0) {
                            // 搜索并选择第一个匹配的话题
                            fetchTopicSuggestions(value).then(suggestions => {
                                if (suggestions && suggestions.length > 0) {
                                    const firstTopic = suggestions[0].name;
                                    if (!selectedTopics.has(firstTopic)) {
                                        selectedTopics.add(firstTopic);
                                        incrementTopicUsage(firstTopic);
                                        renderSelectedTopics();
                                        fetchPopularTopics();
                                        topicSearch.value = '';
                                        showToast(`已选择话题: ${firstTopic}`, 'success');
                                    }
                                }
                            });
                        }
                    }
                });
            }

            renderTopicSuggestions();

            const voteTitle = document.getElementById('vote-title');
            if (voteTitle) {
                voteTitle.addEventListener('input', () => {
                    updateVoteTitleCount();
                });
            }
        }

        function setSaveStatus(text, color) {
            const saveStatus = document.getElementById('save-status');
            if (saveStatus) {
                saveStatus.textContent = text;
                if (color) saveStatus.style.color = color;
            }
            const topStatus = document.getElementById('top-save-status');
            if (topStatus) {
                topStatus.textContent = text;
                if (color) topStatus.style.color = color;
            }
        }

        function updateTitleCount() {
            const input = document.getElementById('post-title');
            const counter = document.getElementById('title-counter');
            if (!input || !counter) return;
            const count = (input.value || '').length;
            counter.textContent = `${count}/30`;
        }

        // 更新字数统计
        function updateWordCount() {
            if (!editor) return;
            const text = editor.getText();
            const count = text.length;
            const el = document.getElementById('content-counter');
            if (el) {
                el.textContent = `${count}/30000`;
            }
        }

        // 标记为有未保存的更改
        function markAsChanged() {
            hasUnsavedChanges = true;
            setSaveStatus('保存中...', '#e6a23c');
        }

        // 防抖自动保存
        function debouncedAutoSave() {
            clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(() => {
                autoSave();
            }, 1000);
        }

        // 自动保存到缓存
        function autoSave() {
            if (!editor) return;

            const title = document.getElementById('post-title').value;
            const content = editor.getHtml();

            const cacheData = {
                title: title,
                content: content,
                timestamp: new Date().toISOString()
            };

            localStorage.setItem(CACHE_KEY, JSON.stringify(cacheData));

            setSaveStatus('已自动保存', '#67c23a');
            hasUnsavedChanges = false;

            console.log('自动保存成功:', cacheData);
        }

        // 加载草稿或缓存
        async function loadDraftOrCache() {
            // 从 URL 参数中获取草稿 ID
            const urlParams = new URLSearchParams(window.location.search);
            const draftId = urlParams.get('draftId');
            
            if (draftId) {
                // 从草稿箱进入，加载草稿内容
                await loadDraftFromServer(draftId);
            } else {
                // 直接点击“编写帖子”，不加载缓存，显示空白编辑器
                // 这样可以确保每次新建帖子时都是干净的状态
                console.log('新建帖子，使用空白编辑器');
            }
        }

        // 从服务器加载草稿
        async function loadDraftFromServer(draftId) {
            try {
                const response = await fetch(`/api/drafts/${draftId}`);
                const result = await response.json();
                
                if (result.code === 200) {
                    const draft = result.data;
                    currentDraftId = draft.id;
                    
                    document.getElementById('post-title').value = draft.title || '';
                    updateTitleCount();
                    if (draft.content && draft.content !== '<p><br></p>') {
                        editor.setHtml(draft.content);
                    }
                    
                    // ✅ 恢复投票数据
                    if (draft.vote) {
                        postVoteData = draft.vote;
                        console.log('✅ 已恢复草稿中的投票数据:', postVoteData);
                    }
                    
                    updateWordCount();
                    showToast('已加载草稿', 'info');
                    
                    // 保存快照，这样刚加载时不会提示有未保存的更改
                    lastSavedDraftSnapshot = {
                        title: draft.title || '',
                        content: draft.content || '<p><br></p>',
                        vote: draft.vote // ✅ 保存投票快照
                    };
                } else {
                    showToast('加载草稿失败：' + result.message, 'error');
                    loadCache(); // 失败时加载本地缓存
                }
            } catch (error) {
                console.error('加载草稿失败:', error);
                showToast('加载草稿失败', 'error');
                loadCache();
            }
        }

        // 加载缓存
        function loadCache() {
            const cached = localStorage.getItem(CACHE_KEY);
            if (cached) {
                try {
                    const cacheData = JSON.parse(cached);
                    
                    if (cacheData.title) {
                        document.getElementById('post-title').value = cacheData.title;
                        updateTitleCount();
                    }
                    
                    if (cacheData.content && cacheData.content !== '<p><br></p>') {
                        editor.setHtml(cacheData.content);
                    }
                    
                    updateWordCount();
                    showToast('已恢复上次编辑的内容', 'info');
                } catch (e) {
                    console.error('加载缓存失败:', e);
                }
            }
        }

        // 跳转到草稿箱
        function goToDrafts() {
            window.location.href = '/drafts.html';
        }

        // 保存到草稿箱
        async function saveToDrafts() {
            const title = document.getElementById('post-title').value.trim();
            const content = editor.getHtml();
            
            if (!title && (!content || content === '<p><br></p>')) {
                showToast('没有可保存的内容', 'info');
                return;
            }

            try {
                const response = await fetch('/api/drafts/save', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        id: currentDraftId,
                        title: title,
                        draftType: 'text',
                        content: content,
                        vote: postVoteData // ✅ 保存投票数据到草稿
                    })
                });
                
                const result = await response.json();
                
                if (result.code === 200) {
                    currentDraftId = result.data.id;
                    showToast('已保存到草稿箱', 'success');
                    hasUnsavedChanges = false;
                    setSaveStatus('已保存到草稿箱', '#67c23a');
                    
                    // 保存内容快照，用于后续对比
                    lastSavedDraftSnapshot = {
                        title: title,
                        content: content,
                        vote: postVoteData // ✅ 保存投票快照
                    };
                } else {
                    showToast('保存失败：' + result.message, 'error');
                }
            } catch (error) {
                console.error('保存草稿失败:', error);
                showToast('保存失败，请检查网络连接', 'error');
            }
        }

        // 发表帖子
        async function publishPost() {
            if (isSubmitting) return; // 正在提交中，不重复操作

            const title = document.getElementById('post-title').value.trim();
            const content = editor.getHtml();
            const category = document.querySelector('input[name="post-category"]:checked')?.value || '';
            const isAnonymous = document.getElementById('anonymous-flag')?.checked === true;

            if (!title) {
                showToast('请输入帖子标题', 'error');
                return;
            }

            if (!content || content === '<p><br></p>') {
                showToast('请输入帖子内容', 'error');
                return;
            }

            const topicsHtml = Array.from(selectedTopics).length > 0
                ? `<p>${escapeHtml('#' + Array.from(selectedTopics).join(' #'))}</p><p><br></p>`
                : '';
            const finalContent = `${content}${topicsHtml}`;

            isSubmitting = true; // 开启提交标志，禁用 beforeunload 弹窗

            try {
                const requestData = {
                    title: title,
                    content: finalContent,
                    category: category,
                    isAnonymous: isAnonymous,
                    postType: 'text',
                    topicNames: Array.from(selectedTopics)
                };

                // ✅ 直接使用全局变量，不再从HTML提取
                if (postVoteData) {
                    requestData.vote = postVoteData;
                    console.log('✅ 投票数据已添加到请求:', JSON.stringify(postVoteData, null, 2));
                } else {
                    console.log('ℹ️ 此帖子不包含投票');
                }

                const response = await fetch('/api/posts/publish', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(requestData)
                });
                
                const result = await response.json();
                
                if (result.code === 200) {
                    showToast('发布成功！', 'success');
                    
                    // 如果当前有草稿ID，先保存以便删除
                    const draftIdToDelete = currentDraftId;
                    
                    // 清除缓存和状态
                    localStorage.removeItem(CACHE_KEY);
                    hasUnsavedChanges = false;
                    currentDraftId = null;
                    lastSavedDraftSnapshot = null; // 清除快照
                    postVoteData = null; // ✅ 清空投票数据
                    
                    // 删除已发布的草稿
                    if (draftIdToDelete) {
                        await fetch(`/api/drafts/${draftIdToDelete}`, {
                            method: 'DELETE'
                        });
                    }
                    
                    // 跳转到帖子列表页
                    setTimeout(() => {
                        window.location.href = '/posts.html';
                    }, 1500);
                } else {
                    isSubmitting = false; // 失败后允许再次操作
                    showToast('发布失败：' + result.message, 'error');
                }
            } catch (error) {
                isSubmitting = false; // 失败后允许再次操作
                console.error('发布帖子失败:', error);
                showToast('发布失败', 'error');
            }
        }

        // 处理退出
        async function handleExit(saveToDraft) {
            const modal = document.getElementById('exit-modal');
            
            if (saveToDraft) {
                // 保存到草稿箱
                await saveToDrafts();
            } else {
                // 删除缓存
                localStorage.removeItem(CACHE_KEY);
                showToast('已放弃保存', 'info');
            }
            
            modal.style.display = 'none';
            hasUnsavedChanges = false;
            
            // 可以执行实际的页面跳转
            // window.location.href = '/';
        }

        // 处理取消按钮点击
        function handleCancel() {
            // 检查是否有内容
            if (!hasContent()) {
                // 没有内容，直接返回
                goBack();
                return;
            }
            
            // 检查是否与最后一次保存的草稿相同
            if (isSameAsLastSavedDraft()) {
                // 内容没有变化，直接返回
                goBack();
                return;
            }
            
            // 有未保存的更改，显示确认对话框
            showCancelModal();
        }

        // 检查当前内容是否与最后一次保存的草稿相同
        function isSameAsLastSavedDraft() {
            if (!lastSavedDraftSnapshot) {
                return false;
            }
            
            const currentTitle = document.getElementById('post-title').value.trim();
            const currentContent = editor.getHtml();
            
            return currentTitle === lastSavedDraftSnapshot.title && 
                   currentContent === lastSavedDraftSnapshot.content;
        }

        // 检查是否有内容
        function hasContent() {
            if (!editor) return false;
            
            const title = document.getElementById('post-title').value.trim();
            const content = editor.getHtml();
            
            // 检查标题是否为空
            if (title) return true;
            
            // 检查内容是否为空（排除默认的空白段落）
            if (content && content !== '<p><br></p>') return true;
            
            return false;
        }

        // 显示取消确认对话框
        function showCancelModal() {
            const modal = document.getElementById('cancel-modal');
            modal.style.display = 'block';
        }

        // 处理取消确认
        async function handleCancelConfirm(saveToDraft) {
            const modal = document.getElementById('cancel-modal');
            
            if (saveToDraft) {
                // 保存到草稿箱
                await saveToDrafts();
            } else {
                // 清除缓存和编辑器内容
                clearCacheAndContent();
                showToast('已清除所有内容', 'info');
            }
            
            modal.style.display = 'none';
            
            // 延迟返回，确保 hasUnsavedChanges 已经被正确设置
            setTimeout(() => {
                goBack();
            }, 100);
        }

        // 清除缓存和编辑器内容
        function clearCacheAndContent() {
            // 清除 localStorage 缓存
            localStorage.removeItem(CACHE_KEY);
            
            // 清空标题
            document.getElementById('post-title').value = '';
            updateTitleCount();
            
            // 清空编辑器内容（这会触发 onChange 事件，将 hasUnsavedChanges 设为 true）
            if (editor) {
                editor.clear();
            }
            
            // 更新字数统计
            updateWordCount();
            
            // 清除快照
            lastSavedDraftSnapshot = null;
            
            // 延迟重置状态，确保在 onChange 事件之后执行
            setTimeout(() => {
                hasUnsavedChanges = false;
                setSaveStatus('已自动保存', '#67c23a');
            }, 50);
        }

        const TOPIC_HEAT_KEY = 'topic_heat_map_v1';

        const TOPIC_DEFAULTS = [
            { name: '宿舍生活', heat: 120 },
            { name: '选课攻略', heat: 110 },
            { name: '社团活动', heat: 105 },
            { name: '考研经验', heat: 102 },
            { name: '实习分享', heat: 98 },
            { name: '校园美食', heat: 96 },
            { name: '二手交易', heat: 92 },
            { name: '失物招领', heat: 90 },
            { name: '期末复习', heat: 88 },
            { name: '学习资料', heat: 86 },
            { name: '自习室打卡', heat: 84 },
            { name: '校园通知', heat: 82 },
            { name: '奖学金申请', heat: 80 },
            { name: '四六级备考', heat: 78 }
        ];

        function loadTopicHeatMap() {
            try {
                const raw = localStorage.getItem(TOPIC_HEAT_KEY);
                if (!raw) return {};
                const data = JSON.parse(raw);
                if (data && typeof data === 'object') return data;
                return {};
            } catch (e) {
                return {};
            }
        }

        function saveTopicHeatMap(map) {
            try {
                localStorage.setItem(TOPIC_HEAT_KEY, JSON.stringify(map));
            } catch (e) {}
        }

        function bumpTopicHeat(name, delta = 1) {
            const map = loadTopicHeatMap();
            const prev = Number(map[name] || 0);
            map[name] = prev + delta;
            saveTopicHeatMap(map);
        }

        function getSortedTopics() {
            const map = loadTopicHeatMap();
            const list = TOPIC_DEFAULTS.map((t) => ({
                name: t.name,
                heat: t.heat + Number(map[t.name] || 0)
            }));
            list.sort((a, b) => {
                if (b.heat !== a.heat) return b.heat - a.heat;
                return a.name.localeCompare(b.name, 'zh-CN');
            });
            return list;
        }

        const selectedTopics = new Set();

        function renderTopicSuggestions(overrideList) {
            const container = document.getElementById('topic-suggestions');
            if (!container) return;
            
            // 如果有覆盖列表，直接渲染
            if (overrideList) {
                renderTopicList(container, overrideList);
                return;
            }
            
            // 否则从后端获取热门话题
            fetchPopularTopics();
        }
        
        // 从后端获取热门话题
        async function fetchPopularTopics() {
            try {
                const response = await fetch('/api/topics/popular?limit=14');
                const result = await response.json();
                
                if (result.code === 200 && result.data && result.data.length > 0) {
                    const container = document.getElementById('topic-suggestions');
                    renderTopicList(container, result.data.map(t => ({ name: t.name, heat: t.usageCount })));
                } else {
                    // 如果后端没有数据，使用默认列表
                    const list = getSortedTopics();
                    const container = document.getElementById('topic-suggestions');
                    renderTopicList(container, list);
                }
            } catch (error) {
                console.error('获取热门话题失败:', error);
                // 失败时使用默认列表
                const list = getSortedTopics();
                const container = document.getElementById('topic-suggestions');
                renderTopicList(container, list);
            }
        }
        
        // 渲染话题列表
        function renderTopicList(container, list) {
            container.innerHTML = '';
            list.forEach((item) => {
                const name = item.name || item;
                const chip = document.createElement('div');
                chip.className = 'chip' + (selectedTopics.has(name) ? ' active' : '');
                chip.textContent = name;
                chip.addEventListener('click', () => {
                    if (selectedTopics.has(name)) {
                        selectedTopics.delete(name);
                    } else {
                        // 检查数量限制
                        if (selectedTopics.size >= 5) {
                            showToast('最多只能选择5个话题', 'error');
                            return;
                        }
                        selectedTopics.add(name);
                        // 调用后端API增加使用次数
                        incrementTopicUsage(name);
                    }
                    renderSelectedTopics();
                    // 重新获取热门话题（更新排序）
                    fetchPopularTopics();
                });
                container.appendChild(chip);
            });
        }
        
        // 增加话题使用次数
        async function incrementTopicUsage(topicName) {
            try {
                await fetch(`/api/topics/${encodeURIComponent(topicName)}/increment-usage`, {
                    method: 'POST'
                });
            } catch (error) {
                console.error('增加话题使用次数失败:', error);
            }
        }

        function renderSelectedTopics() {
            const container = document.getElementById('selected-topics');
            if (!container) return;
            const list = Array.from(selectedTopics);
            if (list.length === 0) {
                container.style.display = 'none';
                container.innerHTML = '';
                return;
            }
            container.style.display = 'flex';
            container.innerHTML = '';
            list.forEach((name) => {
                const chip = document.createElement('div');
                chip.className = 'chip active';
                chip.textContent = name;
                chip.addEventListener('click', () => {
                    selectedTopics.delete(name);
                    renderSelectedTopics();
                    renderTopicSuggestions();
                });
                container.appendChild(chip);
            });
        }

        function filterTopicSuggestions(keyword) {
            const key = (keyword || '').trim();
            if (!key) {
                // 如果没有关键词，显示热门话题
                fetchPopularTopics();
                return;
            }
            
            // 调用后端API获取搜索建议
            fetchTopicSuggestions(key);
        }
        
        // 从后端获取话题搜索建议
        async function fetchTopicSuggestions(prefix) {
            try {
                const response = await fetch(`/api/topics/suggestions?prefix=${encodeURIComponent(prefix)}&limit=10`);
                const result = await response.json();
                
                if (result.code === 200 && result.data && result.data.length > 0) {
                    const container = document.getElementById('topic-suggestions');
                    renderTopicList(container, result.data.map(t => ({ name: t.name, heat: t.usageCount })));
                    return result.data; // 返回数据
                } else {
                    // 如果后端没有数据，使用本地过滤
                    const filtered = getSortedTopics().filter((t) => 
                        t.name.toLowerCase().includes(prefix.toLowerCase())
                    );
                    const container = document.getElementById('topic-suggestions');
                    renderTopicList(container, filtered);
                    return filtered; // 返回数据
                }
            } catch (error) {
                console.error('获取话题建议失败:', error);
                // 失败时使用本地过滤
                const filtered = getSortedTopics().filter((t) => 
                    t.name.toLowerCase().includes(prefix.toLowerCase())
                );
                const container = document.getElementById('topic-suggestions');
                renderTopicList(container, filtered);
                return filtered; // 返回数据
            }
        }

        // ========== 功能3：智能话题选择器增强 ==========
        
        // 显示创建新话题对话框
        function showCreateTopicDialog(topicName) {
            // 验证话题名称
            const validation = validateTopicName(topicName);
            if (!validation.valid) {
                showToast(validation.message, 'error');
                return;
            }
            
            // 检查是否已存在
            const allTopics = getSortedTopics();
            const exists = allTopics.some(t => t.name === topicName);
            if (exists) {
                showToast('该话题已存在，请直接选择', 'info');
                document.getElementById('topic-search-input').value = '';
                return;
            }
            
            // 显示确认对话框
            if (confirm(`是否创建新话题 "${topicName}"？`)) {
                createNewTopic(topicName);
            }
        }
        
        // 验证话题名称
        function validateTopicName(name) {
            if (!name || name.trim().length === 0) {
                return { valid: false, message: '话题名称不能为空' };
            }
            
            if (name.length < 2 || name.length > 20) {
                return { valid: false, message: '话题名称长度必须在2-20个字符之间' };
            }
            
            // 只允许中英文、数字和下划线
            const validPattern = /^[\u4e00-\u9fa5a-zA-Z0-9_]+$/;
            if (!validPattern.test(name)) {
                return { valid: false, message: '话题名称只能包含中英文、数字和下划线' };
            }
            
            return { valid: true };
        }
        
        // 创建新话题
        async function createNewTopic(topicName) {
            // 检查数量限制
            if (selectedTopics.size >= 5) {
                showToast('最多只能选择5个话题', 'error');
                return;
            }
            
            try {
                // 调用后端API创建或获取话题（仅当时使用，不存入推荐列表）
                const response = await fetch('/api/topics/get-or-create', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ name: topicName })
                });
                
                const result = await response.json();
                
                if (result.code === 200) {
                    // 自动选中
                    selectedTopics.add(topicName);
                    
                    // 清空搜索框
                    document.getElementById('topic-search-input').value = '';
                    
                    // 重新渲染已选话题
                    renderSelectedTopics();
                    
                    // 注意：不调用renderTopicSuggestions()，避免自定义话题出现在推荐列表中
                    
                    showToast(`话题 "${topicName}" 创建成功`, 'success');
                } else {
                    showToast(result.message || '创建话题失败', 'error');
                }
            } catch (error) {
                console.error('创建话题失败:', error);
                showToast('网络错误，请稍后重试', 'error');
            }
        }

        function insertImageAtEnd(url, alt) {
            if (!editor) return;
            const safeUrl = String(url || '').trim();
            if (!safeUrl) return;
            const safeAlt = escapeHtml(alt || '');

            try {
                editor.focus(true);
                const hasText = editor.getText().trim().length > 0;
                if (hasText) {
                    editor.dangerouslyInsertHtml('<p><br></p>');
                }
                editor.dangerouslyInsertHtml(`<p><img src="${escapeHtml(safeUrl)}" alt="${safeAlt}" draggable="false" data-user-scalable="no"></p><p><br></p>`);
                ensureEditorImagesAttrs();
            } catch (e) {
                console.error(e);
            }
        }

        let lastTouchEndTs = 0;

        function initEditorImageBehaviors() {
            document.addEventListener('gesturestart', (e) => e.preventDefault(), { passive: false });
            document.addEventListener('gesturechange', (e) => e.preventDefault(), { passive: false });
            document.addEventListener('gestureend', (e) => e.preventDefault(), { passive: false });

            const container = document.getElementById('editor-container');
            if (!container) return;

            container.addEventListener('touchmove', (e) => {
                if (e.touches && e.touches.length > 1) {
                    e.preventDefault();
                }
            }, { passive: false, capture: true });

            container.addEventListener('touchend', (e) => {
                const now = Date.now();
                if (now - lastTouchEndTs <= 280) {
                    e.preventDefault();
                }
                lastTouchEndTs = now;
            }, { passive: false, capture: true });

            container.addEventListener('dblclick', (e) => {
                const t = e.target;
                if (t && t.tagName === 'IMG') {
                    e.preventDefault();
                    e.stopPropagation();
                }
            }, true);

            container.addEventListener('contextmenu', (e) => {
                const t = e.target;
                if (t && t.tagName === 'IMG') {
                    e.preventDefault();
                }
            }, true);

            container.addEventListener('click', (e) => {
                const t = e.target;
                if (t && t.tagName === 'IMG') {
                    openImageViewer(t.getAttribute('src') || '');
                }
            }, true);

            const observer = new MutationObserver(() => {
                ensureEditorImagesAttrs();
            });
            observer.observe(container, { childList: true, subtree: true });
            ensureEditorImagesAttrs();
        }

        function ensureEditorImagesAttrs() {
            const root = document.getElementById('editor-container');
            if (!root) return;
            root.querySelectorAll('img').forEach((img) => {
                img.setAttribute('draggable', 'false');
                img.setAttribute('data-user-scalable', 'no');
            });
        }

        function openImageViewer(src) {
            const viewer = document.getElementById('imageViewer');
            const img = document.getElementById('imageViewerImg');
            if (!viewer || !img) return;
            const safe = String(src || '').trim();
            if (!safe) return;
            img.src = safe;
            viewer.classList.add('open');
        }

        function closeImageViewer() {
            const viewer = document.getElementById('imageViewer');
            const img = document.getElementById('imageViewerImg');
            if (!viewer || !img) return;
            viewer.classList.remove('open');
            img.removeAttribute('src');
        }

        let voteOptionCount = 2;

        function openVoteModal() {
            const modal = document.getElementById('vote-modal');
            if (!modal) return;
            resetVoteForm();
            modal.style.display = 'block';
        }

        function closeVoteModal() {
            const modal = document.getElementById('vote-modal');
            if (!modal) return;
            modal.style.display = 'none';
        }

        function resetVoteForm() {
            const titleEl = document.getElementById('vote-title');
            const deadlineEl = document.getElementById('vote-deadline');
            if (titleEl) titleEl.value = '';
            
            // ✅ 设置默认截止时间为当前时间后10分钟
            if (deadlineEl) {
                const now = new Date();
                const defaultDeadline = new Date(now.getTime() + 10 * 60 * 1000); // 10分钟后
                // 转换为 datetime-local 格式: YYYY-MM-DDTHH:mm
                const year = defaultDeadline.getFullYear();
                const month = String(defaultDeadline.getMonth() + 1).padStart(2, '0');
                const day = String(defaultDeadline.getDate()).padStart(2, '0');
                const hours = String(defaultDeadline.getHours()).padStart(2, '0');
                const minutes = String(defaultDeadline.getMinutes()).padStart(2, '0');
                deadlineEl.value = `${year}-${month}-${day}T${hours}:${minutes}`;
            }
            
            voteOptionCount = 2;
            renderVoteOptions();
            updateVoteTitleCount();
        }

        function updateVoteTitleCount() {
            const titleEl = document.getElementById('vote-title');
            const counterEl = document.getElementById('vote-title-counter');
            if (!titleEl || !counterEl) return;
            counterEl.textContent = `${(titleEl.value || '').length}/30`;
        }

        function renderVoteOptions() {
            const container = document.getElementById('vote-options');
            if (!container) return;
            container.innerHTML = '';
            for (let i = 1; i <= voteOptionCount; i++) {
                const row = document.createElement('div');
                row.className = 'vote-option-row';

                const label = document.createElement('div');
                label.className = 'vote-option-label';
                label.textContent = `选项${i}`;

                const field = document.createElement('div');
                field.className = 'vote-option-field';

                const wrap = document.createElement('div');
                wrap.className = 'vote-input-wrap';

                const input = document.createElement('input');
                input.type = 'text';
                input.className = 'text-input';
                input.maxLength = 40;
                input.id = `vote-option-${i}`;
                input.addEventListener('input', () => updateVoteOptionCount(i));

                const counter = document.createElement('div');
                counter.className = 'vote-counter';
                counter.id = `vote-option-counter-${i}`;
                counter.textContent = '0/40';

                wrap.appendChild(input);
                wrap.appendChild(counter);
                field.appendChild(wrap);

                row.appendChild(label);
                row.appendChild(field);
                container.appendChild(row);
            }

            updateVoteMaxChoicesOptions();
        }

        function updateVoteOptionCount(i) {
            const input = document.getElementById(`vote-option-${i}`);
            const counter = document.getElementById(`vote-option-counter-${i}`);
            if (!input || !counter) return;
            counter.textContent = `${(input.value || '').length}/40`;
        }

        function addVoteOption() {
            if (voteOptionCount >= 10) {
                showToast('最多只能添加 10 个选项', 'info');
                return;
            }
            voteOptionCount += 1;
            renderVoteOptions();
        }

        function updateVoteMaxChoicesOptions() {
            const select = document.getElementById('vote-max-choices');
            if (!select) return;
            const prev = Number(select.value || '1');
            select.innerHTML = '';
            for (let i = 1; i <= voteOptionCount; i++) {
                const opt = document.createElement('option');
                opt.value = String(i);
                opt.textContent = String(i);
                select.appendChild(opt);
            }
            const next = Math.min(Math.max(prev, 1), voteOptionCount);
            select.value = String(next);
        }

        function saveVote() {
            if (!editor) return;
            const title = (document.getElementById('vote-title')?.value || '').trim();
            const deadline = (document.getElementById('vote-deadline')?.value || '').trim();
            const maxChoices = Number(document.getElementById('vote-max-choices')?.value || '1');

            const options = [];
            for (let i = 1; i <= voteOptionCount; i++) {
                const v = (document.getElementById(`vote-option-${i}`)?.value || '').trim();
                if (v) options.push(v);
            }

            if (!title) {
                showToast('请输入投票名称', 'error');
                return;
            }
            if (options.length < 2) {
                showToast('请至少填写 2 个投票选项', 'error');
                return;
            }

            // ✅ 验证截止日期：不能早于当前时间后5分钟
            if (deadline) {
                const deadlineDate = new Date(deadline);
                const now = new Date();
                const minDeadline = new Date(now.getTime() + 5 * 60 * 1000); // 5分钟后
                
                if (deadlineDate < minDeadline) {
                    showToast('截止时间不能早于当前时间后5分钟', 'error');
                    return;
                }
            }

            // ✅ 保存到全局变量（不再嵌入HTML）
            postVoteData = {
                title,
                // ✅ 直接发送本地时间字符串，不要转换为 UTC
                // datetime-local 输入框的值格式为 "YYYY-MM-DDTHH:mm"
                // 后端 Jackson 会根据配置的 GMT+8 时区正确解析
                deadline: deadline ? deadline + ':00' : null,  // 添加秒数部分，变成 "YYYY-MM-DDTHH:mm:ss"
                maxChoices: Math.min(Math.max(maxChoices, 1), options.length),
                options: options.map((opt, idx) => ({
                    content: opt,
                    sortOrder: idx
                }))
            };

            // 在编辑器中插入一个只读的占位文本（仅用于提示用户）
            const placeholder = `[📊 投票: ${title}]`;
            editor.insertText(placeholder);
            
            closeVoteModal();
            markAsChanged();
            debouncedAutoSave();
            showToast('投票已添加', 'success');
        }

        function escapeHtml(str) {
            return String(str)
                .replaceAll('&', '&amp;')
                .replaceAll('<', '&lt;')
                .replaceAll('>', '&gt;')
                .replaceAll('"', '&quot;')
                .replaceAll("'", '&#39;');
        }

        // 从编辑器内容中提取投票数据
        function extractVoteFromContent(content) {
            if (!content) return null;

            // 匹配 <div class="vote-block" data-vote="...">
            const voteRegex = /<div[^>]*class=["']vote-block["'][^>]*data-vote=["']([^"']+)["'][^>]*>/i;
            const match = content.match(voteRegex);

            if (match && match[1]) {
                try {
                    const decoded = decodeURIComponent(match[1]);
                    const voteData = JSON.parse(decoded);
                    
                    // 转换为后端需要的格式
                    return {
                        title: voteData.title,
                        deadline: voteData.deadline ? new Date(voteData.deadline).toISOString() : null,
                        maxChoices: voteData.maxChoices || 1,
                        options: voteData.options.map((opt, idx) => ({
                            content: opt,
                            sortOrder: idx
                        }))
                    };
                } catch (e) {
                    console.error('解析投票数据失败:', e);
                    return null;
                }
            }

            return null;
        }

        // 返回上一页
        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                // 如果没有历史记录，跳转到首页
                window.location.href = '/';
            }
        }

        // 显示提示信息
        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast toast-${type}`;
            toast.style.display = 'block';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // 监听页面关闭/刷新事件
        window.addEventListener('beforeunload', function(e) {
            if (isSubmitting) return; // 正在提交时不弹窗
            if (hasUnsavedChanges) {
                e.preventDefault();
                e.returnValue = '';
                return '';
            }
        });

        // 监听浏览器后退按钮
        window.addEventListener('popstate', function(e) {
            if (hasUnsavedChanges) {
                showExitModal();
            }
        });

        // 显示退出确认对话框
        function showExitModal() {
            const modal = document.getElementById('exit-modal');
            modal.style.display = 'block';
        }

        // 拦截所有可能导致页面退出的操作
        document.addEventListener('click', function(e) {
            // 如果是返回按钮或其他导航链接
            if (e.target.tagName === 'A' && e.target.href && !e.target.href.includes(window.location.hostname)) {
                if (hasUnsavedChanges) {
                    e.preventDefault();
                    showExitModal();
                }
            }
        });

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', initEditor);
    </script>
