<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>发布交友帖</title>
    <link href="https://cdn.jsdelivr.net/npm/@wangeditor/editor@5.1.23/dist/css/style.css" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            padding: 0;
        }

        .page-topbar {
            position: sticky;
            top: 0;
            z-index: 50;
            background: #ffffff;
            border-bottom: 1px solid #ebeef5;
        }

        .topbar-inner {
            max-width: 1200px;
            margin: 0 auto;
            height: 56px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            column-gap: 12px;
        }

        .topbar-title {
            font-size: 18px;
            font-weight: 700;
            color: #303133;
        }

        .topbar-center {
            text-align: center;
            font-size: 13px;
            color: #909399;
            user-select: none;
        }

        .topbar-actions {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: flex-end;
        }

        .topbar-btn {
            padding: 8px 14px;
            border: 1px solid #dcdfe6;
            border-radius: 8px;
            background: #ffffff;
            color: #606266;
            cursor: pointer;
            font-size: 14px;
        }

        .topbar-btn:hover {
            border-color: #c6e2ff;
            background: #ecf5ff;
            color: #409eff;
        }

        .topbar-primary {
            padding: 8px 14px;
            border: 1px solid #409eff;
            border-radius: 8px;
            background: #409eff;
            color: #ffffff;
            cursor: pointer;
            font-size: 14px;
        }

        .topbar-primary:hover {
            background: #3a8ee6;
            border-color: #3a8ee6;
        }

        .page-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 24px 20px 40px;
        }

        .form-card {
            background-color: #fff;
            border: 1px solid #ebeef5;
            border-radius: 12px;
            padding: 26px 26px 18px;
            box-shadow: 0 6px 18px rgba(0, 0, 0, 0.04);
        }

        .form-row {
            margin-bottom: 22px;
        }

        .form-label {
            font-size: 14px;
            color: #606266;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .text-input {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .text-input:focus {
            outline: none;
            border-color: #409eff;
        }

        textarea.text-input {
            height: auto;
            min-height: 100px;
            padding: 10px 12px;
            resize: vertical;
        }

        .select-input {
            width: 100%;
            height: 40px;
            padding: 0 12px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            font-size: 14px;
            background: #ffffff;
            cursor: pointer;
            transition: border-color 0.2s;
        }

        .select-input:focus {
            outline: none;
            border-color: #409eff;
        }

        #editor-wrapper {
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            overflow: hidden;
        }

        #toolbar-container {
            border-bottom: 1px solid #ebeef5;
            background: #fafafa;
        }

        #editor-container {
            min-height: 300px;
            background: #ffffff;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            font-size: 13px;
            color: #909399;
        }

        .auto-save-status {
            color: #67c23a;
        }

        .word-count {
            color: #909399;
        }

        .subtext {
            font-size: 12px;
            color: #909399;
            margin-top: 4px;
        }

        .topic-search {
            margin-bottom: 10px;
        }

        .chips {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            border-radius: 999px;
            border: 1px solid #dcdfe6;
            background: #ffffff;
            color: #606266;
            font-size: 13px;
            cursor: pointer;
            user-select: none;
            transition: all 0.15s ease;
        }

        .chip:hover {
            border-color: #c6e2ff;
            background: #ecf5ff;
            color: #409eff;
        }

        .chip.active {
            border-color: #409eff;
            background: #ecf5ff;
            color: #409eff;
        }

        .bottom-actions {
            display: flex;
            justify-content: center;
            padding-top: 18px;
        }

        .publish-bottom-btn {
            width: 220px;
            height: 44px;
            border-radius: 8px;
            border: 1px solid #409eff;
            background: #409eff;
            color: #ffffff;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            transition: all 0.15s ease;
        }

        .publish-bottom-btn:hover {
            background: #3a8ee6;
            border-color: #3a8ee6;
        }

        .publish-bottom-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 12px 24px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            z-index: 9999;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        .toast.show {
            display: block;
        }

        .toast.success {
            background: #67c23a;
        }

        .toast.error {
            background: #f56c6c;
        }

        .toast.info {
            background: #409eff;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.5);
            align-items: center;
            justify-content: center;
        }

        .modal.open {
            display: flex;
        }

        .modal-content {
            background: #ffffff;
            border-radius: 12px;
            padding: 24px;
            max-width: 500px;
            width: 90%;
        }

        .modal-header {
            font-size: 18px;
            font-weight: 700;
            color: #303133;
            margin-bottom: 16px;
        }

        .modal-body {
            font-size: 14px;
            color: #606266;
            margin-bottom: 20px;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn {
            padding: 8px 16px;
            border: 1px solid #dcdfe6;
            border-radius: 6px;
            background: #ffffff;
            color: #606266;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.15s ease;
        }

        .btn:hover {
            border-color: #c6e2ff;
            background: #ecf5ff;
            color: #409eff;
        }

        .btn-confirm {
            background: #409eff;
            border-color: #409eff;
            color: #ffffff;
        }

        .btn-confirm:hover {
            background: #3a8ee6;
            border-color: #3a8ee6;
        }

        /* 联系方式按钮 */
        .add-contact-btn {
            padding: 10px 20px;
            border: 1px dashed #dcdfe6;
            border-radius: 6px;
            background: #fafafa;
            color: #606266;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.2s ease;
            width: 100%;
        }

        .add-contact-btn:hover {
            border-color: #409eff;
            background: #ecf5ff;
            color: #409eff;
        }

        .add-contact-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 联系方式列表 */
        .contact-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .contact-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 16px;
            background: #f5f7fa;
            border: 1px solid #e4e7ed;
            border-radius: 6px;
            transition: all 0.2s ease;
        }

        .contact-item:hover {
            border-color: #c6e2ff;
            background: #ecf5ff;
        }

        .contact-info {
            display: flex;
            align-items: center;
            gap: 12px;
            flex: 1;
        }

        .contact-type-badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 600;
            background: #409eff;
            color: white;
        }

        .contact-type-badge.QQ {
            background: #409eff;
        }

        .contact-type-badge.微信 {
            background: #67c23a;
        }

        .contact-type-badge.邮箱 {
            background: #e6a23c;
        }

        .contact-type-badge.其它 {
            background: #909399;
        }

        .contact-value {
            font-size: 14px;
            color: #303133;
        }

        .contact-delete-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            background: transparent;
            color: #f56c6c;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s ease;
        }

        .contact-delete-btn:hover {
            background: #fef0f0;
        }
    </style>
</head>
<body>
    <div class="page-topbar">
        <div class="topbar-inner">
            <div class="topbar-title">发布交友帖</div>
            <div class="topbar-center"><span id="top-save-status">已自动保存</span></div>
            <div class="topbar-actions">
                <button class="topbar-btn" type="button" onclick="handleCancel()">取消</button>
                <button class="topbar-primary" type="button" onclick="publishPost()">发布</button>
            </div>
        </div>
    </div>

    <div class="page-content">
        <div class="form-card">
            <div class="form-row">
                <div class="form-label">标题：</div>
                <div class="form-control">
                    <input type="text" id="post-title" class="text-input" placeholder="标题(必填)" maxlength="30">
                    <div class="subtext" id="title-counter">0/30</div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-label">性别：</div>
                <div class="form-control" style="display: flex; gap: 20px; align-items: center;">
                    <div style="flex: 1;">
                        <select id="gender-select" class="select-input">
                            <option value="不公布" selected>不公布</option>
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                        <div class="subtext">我的性别</div>
                    </div>
                    <div style="flex: 1;">
                        <select id="target-gender-select" class="select-input">
                            <option value="不限" selected>不限</option>
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                        <div class="subtext">期望对方性别</div>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-label">自我介绍：</div>
                <div class="form-control">
                    <textarea id="self-intro" class="text-input" placeholder="介绍一下你自己吧..." maxlength="500" rows="4"></textarea>
                    <div class="subtext" id="intro-counter">0/500</div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-label">交友目标期望：</div>
                <div class="form-control">
                    <textarea id="friendship-goal" class="text-input" placeholder="你希望找到什么样的朋友..." maxlength="500" rows="4"></textarea>
                    <div class="subtext" id="goal-counter">0/500</div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-label">联系方式：</div>
                <div class="form-control">
                    <button type="button" class="add-contact-btn" onclick="openContactModal()" id="addContactBtn">
                        <span style="font-size: 18px; margin-right: 6px;">+</span> 添加联系方式
                    </button>
                    <div class="subtext" style="margin-top: 8px;">最多可添加3个联系方式</div>
                    <div id="contact-list" class="contact-list" style="margin-top: 12px;"></div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-label">补充内容：</div>
                <div class="form-control">
                    <div id="editor-wrapper">
                        <div id="toolbar-container"></div>
                        <div id="editor-container"></div>
                    </div>
                    <div class="status-bar">
                        <span class="auto-save-status" id="save-status">已自动保存</span>
                        <span class="word-count" id="content-counter">0/30000</span>
                    </div>
                </div>
            </div>

            <div class="form-row">
                <div class="form-label">选择话题：</div>
                <div class="form-control">
                    <div class="subtext" style="margin-bottom: 10px;">选择相关话题，获得更多浏览</div>
                    <div class="topic-search">
                        <input type="text" id="topic-search-input" class="text-input" placeholder="输入话题名称搜索">
                    </div>
                    <div class="chips" id="selected-topics" style="display: none; margin-bottom: 12px;"></div>
                    <div class="subtext" style="margin-bottom: 8px;">推荐话题（最多5个）</div>
                    <div class="chips" id="topic-suggestions"></div>
                </div>
            </div>

            <div class="bottom-actions">
                <button class="publish-bottom-btn" onclick="publishPost()">发布</button>
            </div>
        </div>
    </div>

    <div id="exit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">提示</div>
            <div class="modal-body">
                您有未保存的内容，是否保存到草稿箱？
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="handleExit(false)">否</button>
                <button class="btn btn-confirm" onclick="handleExit(true)">是</button>
            </div>
        </div>
    </div>

    <!-- 添加联系方式弹窗 -->
    <div id="contact-modal" class="modal">
        <div class="modal-content" style="max-width: 450px;">
            <div class="modal-header">添加联系方式</div>
            <div class="modal-body">
                <div style="margin-bottom: 16px;">
                    <label style="display: block; margin-bottom: 8px; font-size: 14px; color: #606266;">联系方式类型</label>
                    <select id="contact-type-select" class="select-input">
                        <option value="QQ">QQ</option>
                        <option value="微信">微信</option>
                        <option value="邮箱">邮箱</option>
                        <option value="其它">其它</option>
                    </select>
                </div>
                <div style="margin-bottom: 16px;">
                    <label style="display: block; margin-bottom: 8px; font-size: 14px; color: #606266;">联系方式</label>
                    <input type="text" id="contact-value-input" class="text-input" placeholder="请输入联系方式">
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeContactModal()">取消</button>
                <button class="btn btn-confirm" onclick="addContact()">确定</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@wangeditor/editor@5.1.23/dist/index.js"></script>
    <script src="/js/auth.js"></script>
    
    <script>
        let editor;
        let autoSaveTimer;
        const CACHE_KEY = 'dating_post_editor_cache';
        let hasUnsavedChanges = false;
        let isSubmitting = false;
        const selectedTopics = new Set();
        const contacts = []; // 存储联系方式

        const TOPIC_DEFAULTS = [
            { name: '寻找知己', heat: 120 },
            { name: '运动伙伴', heat: 110 },
            { name: '学习搭子', heat: 105 },
            { name: '游戏好友', heat: 102 },
            { name: '电影同好', heat: 98 },
            { name: '音乐分享', heat: 96 },
            { name: '旅行结伴', heat: 92 },
            { name: '美食探店', heat: 90 },
            { name: '摄影交流', heat: 88 },
            { name: '读书分享', heat: 86 }
        ];

        window.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();
            initEditor();
        });

        function initEditor() {
            const { createEditor, createToolbar } = window.wangEditor;

            const editorConfig = {
                placeholder: '补充更多你想说的...',
                onChange(editor) {
                    updateWordCount();
                    markAsChanged();
                    debouncedAutoSave();
                },
                MENU_CONF: {
                    uploadImage: {
                        server: '/api/upload/image',
                        fieldName: 'file',
                        maxFileSize: 5 * 1024 * 1024,
                        allowedFileTypes: ['image/*'],
                        customInsert(res, insertFn) {
                            if (res.code === 200) {
                                insertFn(res.data.url, res.data.alt || '', res.data.url);
                                showToast('图片上传成功', 'success');
                            } else {
                                alert(res.message || '图片上传失败');
                            }
                        }
                    }
                }
            };

            editor = createEditor({
                selector: '#editor-container',
                html: '',
                config: editorConfig,
                mode: 'default'
            });

            const toolbarConfig = {};

            createToolbar({
                editor,
                selector: '#toolbar-container',
                config: toolbarConfig,
                mode: 'default'
            });

            initFormEvents();
            loadDraftOrCache();
        }

        function initFormEvents() {
            const titleInput = document.getElementById('post-title');
            if (titleInput) {
                titleInput.addEventListener('input', () => {
                    updateTitleCount();
                    markAsChanged();
                    debouncedAutoSave();
                });
            }

            const selfIntro = document.getElementById('self-intro');
            if (selfIntro) {
                selfIntro.addEventListener('input', () => {
                    updateIntroCount();
                    markAsChanged();
                    debouncedAutoSave();
                });
            }

            const friendshipGoal = document.getElementById('friendship-goal');
            if (friendshipGoal) {
                friendshipGoal.addEventListener('input', () => {
                    updateGoalCount();
                    markAsChanged();
                    debouncedAutoSave();
                });
            }

            const genderSelect = document.getElementById('gender-select');
            if (genderSelect) {
                genderSelect.addEventListener('change', () => {
                    markAsChanged();
                    debouncedAutoSave();
                });
            }

            const targetGenderSelect = document.getElementById('target-gender-select');
            if (targetGenderSelect) {
                targetGenderSelect.addEventListener('change', () => {
                    markAsChanged();
                    debouncedAutoSave();
                });
            }

            const topicSearch = document.getElementById('topic-search-input');
            if (topicSearch) {
                topicSearch.addEventListener('input', () => {
                    filterTopicSuggestions(topicSearch.value.trim());
                });
            }

            renderTopicSuggestions();
        }

        // ==================== 联系方式管理 ====================
        
        function openContactModal() {
            if (contacts.length >= 3) {
                showToast('最多只能添加3个联系方式', 'error');
                return;
            }
            document.getElementById('contact-modal').classList.add('open');
            document.getElementById('contact-value-input').value = '';
            document.getElementById('contact-type-select').value = 'QQ';
        }

        function closeContactModal() {
            document.getElementById('contact-modal').classList.remove('open');
        }

        function addContact() {
            const type = document.getElementById('contact-type-select').value;
            const value = document.getElementById('contact-value-input').value.trim();
            
            if (!value) {
                showToast('请输入联系方式', 'error');
                return;
            }
            
            if (contacts.length >= 3) {
                showToast('最多只能添加3个联系方式', 'error');
                return;
            }
            
            contacts.push({ type, value });
            renderContacts();
            closeContactModal();
            markAsChanged();
            debouncedAutoSave();
            showToast('添加成功', 'success');
        }

        function deleteContact(index) {
            contacts.splice(index, 1);
            renderContacts();
            markAsChanged();
            debouncedAutoSave();
        }

        function renderContacts() {
            const container = document.getElementById('contact-list');
            const addBtn = document.getElementById('addContactBtn');
            
            if (!container || !addBtn) return;
            
            // 更新按钮状态
            if (contacts.length >= 3) {
                addBtn.disabled = true;
                addBtn.style.opacity = '0.5';
                addBtn.style.cursor = 'not-allowed';
            } else {
                addBtn.disabled = false;
                addBtn.style.opacity = '1';
                addBtn.style.cursor = 'pointer';
            }
            
            // 渲染列表
            if (contacts.length === 0) {
                container.innerHTML = '<div style="color: #909399; font-size: 13px; padding: 8px 0;">暂无联系方式</div>';
                return;
            }
            
            container.innerHTML = '';
            contacts.forEach((contact, index) => {
                const item = document.createElement('div');
                item.className = 'contact-item';
                item.innerHTML = `
                    <div class="contact-info">
                        <span class="contact-type-badge ${contact.type}">${contact.type}</span>
                        <span class="contact-value">${escapeHtml(contact.value)}</span>
                    </div>
                    <button type="button" class="contact-delete-btn" onclick="deleteContact(${index})">删除</button>
                `;
                container.appendChild(item);
            });
        }

        function updateTitleCount() {
            const input = document.getElementById('post-title');
            const counter = document.getElementById('title-counter');
            if (!input || !counter) return;
            const count = (input.value || '').length;
            counter.textContent = `${count}/30`;
        }

        function updateIntroCount() {
            const input = document.getElementById('self-intro');
            const counter = document.getElementById('intro-counter');
            if (!input || !counter) return;
            const count = (input.value || '').length;
            counter.textContent = `${count}/500`;
        }

        function updateGoalCount() {
            const input = document.getElementById('friendship-goal');
            const counter = document.getElementById('goal-counter');
            if (!input || !counter) return;
            const count = (input.value || '').length;
            counter.textContent = `${count}/500`;
        }

        function updateWordCount() {
            if (!editor) return;
            const text = editor.getText();
            const count = text.length;
            const el = document.getElementById('content-counter');
            if (el) {
                el.textContent = `${count}/30000`;
            }
        }

        function markAsChanged() {
            setSaveStatus('保存中...', '#e6a23c');
            hasUnsavedChanges = true;
        }

        function setSaveStatus(text, color) {
            const saveStatus = document.getElementById('save-status');
            if (saveStatus) {
                saveStatus.textContent = text;
                if (color) saveStatus.style.color = color;
            }
            const topStatus = document.getElementById('top-save-status');
            if (topStatus) {
                topStatus.textContent = text;
                if (color) topStatus.style.color = color;
            }
        }

        function debouncedAutoSave() {
            clearTimeout(autoSaveTimer);
            autoSaveTimer = setTimeout(() => {
                autoSave();
            }, 800);
        }

        function autoSave() {
            const title = (document.getElementById('post-title')?.value || '').trim();
            const gender = (document.getElementById('gender-select')?.value || '不公布');
            const targetGender = (document.getElementById('target-gender-select')?.value || '不限');
            const selfIntro = (document.getElementById('self-intro')?.value || '').trim();
            const friendshipGoal = (document.getElementById('friendship-goal')?.value || '').trim();
            const content = editor ? editor.getHtml() : '';
            const topics = Array.from(selectedTopics);
            
            const cache = { 
                title, 
                gender,
                targetGender,
                selfIntro,
                friendshipGoal,
                content, 
                topics,
                contacts,
                ts: Date.now()
            };
            
            try {
                localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
                setSaveStatus('已自动保存', '#67c23a');
                hasUnsavedChanges = false;
            } catch (e) {
                console.error('自动保存失败:', e);
            }
        }

        function loadDraftOrCache() {
            try {
                const raw = localStorage.getItem(CACHE_KEY);
                if (!raw) return;
                
                const cache = JSON.parse(raw);
                if (!cache || typeof cache !== 'object') return;

                if (cache.title) {
                    const input = document.getElementById('post-title');
                    if (input) input.value = cache.title;
                }
                
                if (cache.gender) {
                    const select = document.getElementById('gender-select');
                    if (select) select.value = cache.gender;
                }
                
                if (cache.targetGender) {
                    const select = document.getElementById('target-gender-select');
                    if (select) select.value = cache.targetGender;
                }
                
                if (cache.selfIntro) {
                    const textarea = document.getElementById('self-intro');
                    if (textarea) textarea.value = cache.selfIntro;
                }
                
                if (cache.friendshipGoal) {
                    const textarea = document.getElementById('friendship-goal');
                    if (textarea) textarea.value = cache.friendshipGoal;
                }
                
                if (editor && cache.content) {
                    editor.setHtml(cache.content);
                }
                
                selectedTopics.clear();
                if (Array.isArray(cache.topics)) {
                    cache.topics.forEach((t) => selectedTopics.add(String(t)));
                }

                // 加载联系方式
                contacts.length = 0;
                if (Array.isArray(cache.contacts)) {
                    contacts.push(...cache.contacts);
                }
                renderContacts();

                updateTitleCount();
                updateIntroCount();
                updateGoalCount();
                updateWordCount();
                renderSelectedTopics();
                renderTopicSuggestions();
                showToast('已恢复草稿', 'info');
                hasUnsavedChanges = true;
            } catch (e) {
                console.error('加载草稿失败:', e);
            }
        }

        function renderTopicSuggestions(keyword) {
            const container = document.getElementById('topic-suggestions');
            if (!container) return;
            
            const key = (keyword || '').toLowerCase();
            const list = TOPIC_DEFAULTS.filter(t => 
                !key || t.name.toLowerCase().includes(key)
            ).slice(0, 10);
            
            container.innerHTML = '';
            list.forEach((item) => {
                const chip = document.createElement('button');
                chip.type = 'button';
                chip.className = 'chip' + (selectedTopics.has(item.name) ? ' active' : '');
                chip.textContent = item.name;
                chip.addEventListener('click', () => {
                    if (selectedTopics.has(item.name)) {
                        selectedTopics.delete(item.name);
                    } else {
                        if (selectedTopics.size >= 5) {
                            showToast('最多选择5个话题', 'info');
                            return;
                        }
                        selectedTopics.add(item.name);
                    }
                    renderSelectedTopics();
                    renderTopicSuggestions(keyword);
                    markAsChanged();
                });
                container.appendChild(chip);
            });
        }

        function renderSelectedTopics() {
            const container = document.getElementById('selected-topics');
            if (!container) return;
            
            const list = Array.from(selectedTopics);
            if (list.length === 0) {
                container.style.display = 'none';
                container.innerHTML = '';
                return;
            }
            
            container.style.display = 'flex';
            container.innerHTML = '';
            list.forEach((name) => {
                const chip = document.createElement('button');
                chip.type = 'button';
                chip.className = 'chip active';
                chip.textContent = name;
                chip.addEventListener('click', () => {
                    selectedTopics.delete(name);
                    renderSelectedTopics();
                    renderTopicSuggestions();
                    markAsChanged();
                });
                container.appendChild(chip);
            });
        }

        function filterTopicSuggestions(keyword) {
            renderTopicSuggestions(keyword);
        }

        async function publishPost() {
            if (isSubmitting) return;

            const title = document.getElementById('post-title').value.trim();
            const gender = document.getElementById('gender-select').value;
            const targetGender = document.getElementById('target-gender-select').value;
            const selfIntro = document.getElementById('self-intro').value.trim();
            const friendshipGoal = document.getElementById('friendship-goal').value.trim();
            const content = editor.getHtml();

            if (!title) {
                showToast('请输入帖子标题', 'error');
                return;
            }

            if (!selfIntro && !friendshipGoal && (!content || content === '<p><br></p>')) {
                showToast('请至少填写自我介绍或交友目标期望', 'error');
                return;
            }

            isSubmitting = true;

            try {
                let finalContent = '';
                
                // 始终保存我的性别（包括"不公布"）
                if (gender) {
                    finalContent += `<p><strong>我的性别：</strong></p><p>${escapeHtml(gender)}</p><p><br></p>`;
                }
                
                // 始终保存期望对方性别（包括"不限"）
                if (targetGender) {
                    finalContent += `<p><strong>期望对方性别：</strong></p><p>${escapeHtml(targetGender)}</p><p><br></p>`;
                }
                
                if (selfIntro) {
                    finalContent += `<p><strong>【自我介绍】</strong></p><p>${escapeHtml(selfIntro)}</p><p><br></p>`;
                }
                
                if (friendshipGoal) {
                    finalContent += `<p><strong>【交友目标期望】</strong></p><p>${escapeHtml(friendshipGoal)}</p><p><br></p>`;
                }
                
                // 添加补充内容（在交友目标期望之后、联系方式之前）
                if (content && content !== '<p><br></p>') {
                    finalContent += content;
                }
                
                // 添加联系方式
                if (contacts.length > 0) {
                    finalContent += `<p><strong>【联系方式】</strong></p>`;
                    contacts.forEach(contact => {
                        finalContent += `<p>${escapeHtml(contact.type)}：${escapeHtml(contact.value)}</p>`;
                    });
                    finalContent += `<p><br></p>`;
                }
                
                const topicsHtml = Array.from(selectedTopics).length > 0
                    ? `<p>${escapeHtml('#' + Array.from(selectedTopics).join(' #'))}</p><p><br></p>`
                    : '';
                finalContent += topicsHtml;

                const requestData = {
                    title: title,
                    content: finalContent,
                    category: '交友',
                    isAnonymous: false,
                    postType: 'text',
                    topicNames: Array.from(selectedTopics),
                    gender: gender,
                    targetGender: targetGender
                };

                const resp = await fetch('/api/posts/publish', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(requestData)
                });

                const result = await resp.json();

                if (result.code === 200) {
                    showToast('发布成功', 'success');
                    localStorage.removeItem(CACHE_KEY);
                    setTimeout(() => {
                        window.location.href = '/posts.html?category=交友';
                    }, 1500);
                } else {
                    isSubmitting = false;
                    showToast('发布失败：' + result.message, 'error');
                }
            } catch (error) {
                isSubmitting = false;
                console.error('发布帖子失败:', error);
                showToast('发布失败', 'error');
            }
        }

        function handleCancel() {
            if (!hasUnsavedChanges) {
                goBack();
                return;
            }
            
            document.getElementById('exit-modal').classList.add('open');
        }

        function handleExit(saveToDraft) {
            document.getElementById('exit-modal').classList.remove('open');
            
            if (saveToDraft) {
                autoSave();
            } else {
                try {
                    localStorage.removeItem(CACHE_KEY);
                } catch (e) {}
                hasUnsavedChanges = false;
            }
            
            goBack();
        }

        function goBack() {
            if (history.length > 1) {
                history.back();
            } else {
                window.location.href = '/posts.html';
            }
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function showToast(message, type = 'info') {
            const toast = document.getElementById('toast');
            if (!toast) return;
            
            toast.className = `toast show ${type}`;
            toast.textContent = message;
            
            setTimeout(() => {
                toast.className = 'toast';
            }, 2600);
        }

        window.addEventListener('beforeunload', (e) => {
            if (hasUnsavedChanges && !isSubmitting) {
                e.preventDefault();
                e.returnValue = '';
            }
        });
    </script>
</body>
</html>
