<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>草稿箱</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f5f7fa;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
            min-height: 600px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid #e4e7ed;
        }

        .user-bar {
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 10px 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 8px;
            color: white;
            margin-bottom: 20px;
        }

        .user-bar span {
            font-size: 14px;
            font-weight: 500;
        }

        .btn-logout,
        .btn-home {
            padding: 6px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-logout {
            background-color: rgba(255, 255, 255, 0.2);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.3);
        }

        .btn-logout:hover {
            background-color: rgba(255, 255, 255, 0.3);
        }

        .btn-home {
            background-color: white;
            color: #667eea;
        }

        .btn-home:hover {
            background-color: #f5f7fa;
        }

        h1 {
            color: #303133;
            font-size: 24px;
        }

        .batch-toolbar {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 14px;
        }

        .batch-toolbar .btn {
            padding: 8px 12px;
            font-size: 12px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            text-decoration: none;
            display: inline-block;
        }

        .btn-back {
            background-color: #ffffff;
            color: #606266;
            border: 1px solid #dcdfe6;
        }

        .btn-back:hover {
            color: #409eff;
            border-color: #c6e2ff;
            background-color: #ecf5ff;
        }

        .draft-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .draft-item {
            padding: 20px;
            border: 1px solid #e4e7ed;
            border-radius: 6px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }

        .draft-check {
            margin-right: 10px;
            width: 18px;
            height: 18px;
        }

        .draft-item:hover {
            border-color: #409eff;
            box-shadow: 0 2px 8px rgba(64, 158, 255, 0.2);
        }

        .draft-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 12px;
        }

        .draft-title-container {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
            overflow: hidden;
        }

        .draft-type {
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: 600;
            white-space: nowrap;
        }

        .type-image {
            background-color: #ecf5ff;
            color: #409eff;
            border: 1px solid #dcdfe6;
        }

        .type-text {
            background-color: #f0f9eb;
            color: #67c23a;
            border: 1px solid #e1f3d8;
        }

        .draft-title {
            font-size: 18px;
            font-weight: bold;
            color: #303133;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .draft-preview {
            color: #606266;
            font-size: 14px;
            line-height: 1.6;
            margin-bottom: 12px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            height: 44px; /* 两行高度 */
        }

        .draft-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            color: #909399;
            border-top: 1px solid #f2f6fc;
            padding-top: 10px;
        }

        .draft-actions {
            display: flex;
            gap: 8px;
            margin-left: 15px;
        }

        .btn-edit {
            background-color: #409eff;
            color: white;
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-edit:hover {
            background-color: #3a8ee6;
        }

        .btn-delete {
            background-color: #f56c6c;
            color: white;
            padding: 6px 12px;
            font-size: 12px;
        }

        .btn-delete:hover {
            background-color: #e65050;
        }

        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #909399;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .empty-state-text {
            font-size: 16px;
            margin-bottom: 20px;
        }

        .btn-new {
            background-color: #409eff;
            color: white;
        }

        .btn-new:hover {
            background-color: #3a8ee6;
        }

        /* 确认对话框 */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: #fff;
            margin: 15% auto;
            padding: 30px;
            border-radius: 8px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
        }

        .modal-header {
            font-size: 18px;
            font-weight: bold;
            margin-bottom: 15px;
            color: #303133;
        }

        .modal-body {
            margin-bottom: 20px;
            color: #606266;
            line-height: 1.6;
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        .btn-cancel {
            background-color: #ffffff;
            color: #606266;
            border: 1px solid #dcdfe6;
        }

        .btn-cancel:hover {
            color: #409eff;
            border-color: #c6e2ff;
            background-color: #ecf5ff;
        }

        .btn-confirm {
            background-color: #f56c6c;
            color: white;
        }

        .btn-confirm:hover {
            background-color: #e65050;
        }

        /* Toast 提示 */
        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 20px;
            border-radius: 4px;
            color: white;
            font-size: 14px;
            z-index: 2000;
            display: none;
            animation: slideIn 0.3s ease-out;
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .toast-success {
            background-color: #67c23a;
        }

        .toast-error {
            background-color: #f56c6c;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #909399;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="user-bar">
            <span id="currentUsername">欢迎，用户</span>
            <button class="btn-logout" onclick="handleLogout()">退出登录</button>
            <a href="/index.html" class="btn-home">返回首页</a>
        </div>
        
        <div class="header">
            <h1>草稿箱</h1>
            <button class="btn btn-back" onclick="goBack()">返回</button>
        </div>

        <div class="batch-toolbar">
            <label style="display:flex; align-items:center; gap:6px; font-size:13px; color:#606266;">
                <input type="checkbox" id="select-all-checkbox" onchange="toggleSelectAll(this.checked)">
                全选
            </label>
            <button class="btn btn-delete" id="batch-delete-btn" onclick="batchDeleteDrafts()" disabled>批量删除(0)</button>
        </div>

        <div id="draft-list-container">
            <div class="loading">加载中...</div>
        </div>
    </div>

    <!-- 删除确认对话框 -->
    <div id="delete-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">确认删除</div>
            <div class="modal-body">
                确定要删除这篇草稿吗？此操作不可恢复。
            </div>
            <div class="modal-footer">
                <button class="btn btn-cancel" onclick="closeDeleteModal()">取消</button>
                <button class="btn btn-confirm" onclick="confirmDelete()">删除</button>
            </div>
        </div>
    </div>

    <!-- 提示信息 -->
    <div id="toast" class="toast"></div>

    <script src="/js/auth.js"></script>
    <script>
        let drafts = [];
        let deleteDraftId = null;
        let selectedDraftIds = new Set();

        // 页面加载时检查登录状态并获取草稿列表
        document.addEventListener('DOMContentLoaded', async () => {
            await checkAuth();
            await initUserBar();
            await loadDrafts();
        });

        // 加载草稿列表
        async function loadDrafts() {
            try {
                const response = await fetch('/api/drafts/list');
                const result = await response.json();

                if (result.code === 200) {
                    drafts = result.data || [];
                    selectedDraftIds = new Set(Array.from(selectedDraftIds).filter(id => drafts.some(d => d.id === id)));
                    renderDraftList();
                    refreshBatchToolbar();
                } else {
                    showToast('加载失败：' + result.message, 'error');
                }
            } catch (error) {
                console.error('加载草稿失败:', error);
                showToast('加载失败，请检查网络连接', 'error');
            }
        }

        // 渲染草稿列表
        function renderDraftList() {
            const container = document.getElementById('draft-list-container');

            if (drafts.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📝</div>
                        <div class="empty-state-text">暂无草稿</div>
                        <div style="display:flex; gap:10px; justify-content:center; flex-wrap:wrap;">
                            <a href="/post-editor.html" class="btn btn-new">新建帖子</a>
                            <a href="/editor.html" class="btn btn-new">图文发表</a>
                        </div>
                    </div>
                `;
                refreshBatchToolbar();
                return;
            }

            const draftItems = drafts.map(draft => {
                const updateTime = formatDateTime(draft.updateTime);
                const dt = String(draft.draftType || '').toLowerCase();
                const inferred = dt ? dt : (/<img\b/i.test(String(draft.content || '')) ? 'image' : 'text');
                const type = inferred === 'image' ? 'image' : 'text';
                const typeLabel = type === 'image' ? '图文' : '帖子';
                const typeClass = type === 'image' ? 'type-image' : 'type-text';
                
                // 获取更好的预览内容
                let preview = '';
                if (type === 'image') {
                    // 尝试从 content 中提取文本部分
                    const temp = document.createElement('div');
                    temp.innerHTML = draft.content || '';
                    // 移除图片
                    temp.querySelectorAll('img').forEach(img => img.remove());
                    // 移除话题标记
                    temp.querySelectorAll('p').forEach(p => {
                        if ((p.textContent || '').trim().startsWith('#')) p.remove();
                    });
                    preview = (temp.textContent || '').trim();
                    if (!preview) {
                        // 如果没有文字，显示图片预览
                        const img = document.createElement('div');
                        img.innerHTML = draft.content || '';
                        const firstImg = img.querySelector('img');
                        if (firstImg) {
                            preview = '[图片草稿]';
                        }
                    }
                } else {
                    preview = getPlainTextPreview(draft.content);
                }
                
                if (!preview) preview = '无内容预览';

                return `
                    <div class="draft-item" onclick="editDraft(${draft.id}, '${type}')">
                        <div class="draft-header">
                            <div class="draft-title-container">
                                <input class="draft-check" type="checkbox" ${selectedDraftIds.has(draft.id) ? 'checked' : ''} onclick="event.stopPropagation(); toggleDraftSelection(${draft.id}, this.checked)">
                                <span class="draft-type ${typeClass}">${typeLabel}</span>
                                <span class="draft-title">${escapeHtml(draft.title || '无标题')}</span>
                            </div>
                            <div class="draft-actions">
                                <button class="btn btn-edit" onclick="event.stopPropagation(); editDraft(${draft.id}, '${type}')">编辑</button>
                                <button class="btn btn-delete" onclick="event.stopPropagation(); showDeleteModal(${draft.id})">删除</button>
                            </div>
                        </div>
                        <div class="draft-preview">${escapeHtml(preview)}</div>
                        <div class="draft-meta">
                            <span>最后编辑于 ${updateTime}</span>
                        </div>
                    </div>
                `;
            }).join('');

            container.innerHTML = `<div class="draft-list">${draftItems}</div>`;
            refreshBatchToolbar();
        }

        function toggleDraftSelection(id, checked) {
            if (checked) {
                selectedDraftIds.add(id);
            } else {
                selectedDraftIds.delete(id);
            }
            refreshBatchToolbar();
        }

        function toggleSelectAll(checked) {
            if (checked) {
                drafts.forEach(d => selectedDraftIds.add(d.id));
            } else {
                selectedDraftIds.clear();
            }
            renderDraftList();
        }

        function refreshBatchToolbar() {
            const allBox = document.getElementById('select-all-checkbox');
            const batchBtn = document.getElementById('batch-delete-btn');
            const selectedCount = selectedDraftIds.size;
            if (allBox) {
                allBox.checked = drafts.length > 0 && selectedCount === drafts.length;
            }
            if (batchBtn) {
                batchBtn.disabled = selectedCount === 0;
                batchBtn.textContent = `批量删除(${selectedCount})`;
            }
        }

        async function batchDeleteDrafts() {
            const ids = Array.from(selectedDraftIds);
            if (ids.length === 0) return;
            if (!confirm(`确定要删除选中的 ${ids.length} 篇草稿吗？`)) return;
            try {
                const response = await fetch('/api/drafts/batch', {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ ids })
                });
                const result = await response.json();
                if (result.code === 200) {
                    showToast('批量删除成功', 'success');
                    selectedDraftIds.clear();
                    await loadDrafts();
                } else {
                    showToast('批量删除失败：' + result.message, 'error');
                }
            } catch (error) {
                console.error('批量删除草稿失败:', error);
                showToast('批量删除失败，请检查网络连接', 'error');
            }
        }

        // 编辑草稿
        function editDraft(id, draftType) {
            const t = String(draftType || '').toLowerCase();
            if (t === 'image') {
                window.location.href = `/editor.html?draftId=${id}`;
            } else {
                window.location.href = `/post-editor.html?draftId=${id}`;
            }
        }

        // 显示删除确认框
        function showDeleteModal(id) {
            deleteDraftId = id;
            const modal = document.getElementById('delete-modal');
            modal.style.display = 'block';
        }

        // 关闭删除确认框
        function closeDeleteModal() {
            deleteDraftId = null;
            const modal = document.getElementById('delete-modal');
            modal.style.display = 'none';
        }

        // 确认删除
        async function confirmDelete() {
            if (!deleteDraftId) return;

            try {
                const response = await fetch(`/api/drafts/${deleteDraftId}`, {
                    method: 'DELETE'
                });
                const result = await response.json();

                if (result.code === 200) {
                    showToast('删除成功', 'success');
                    closeDeleteModal();
                    // 重新加载列表
                    await loadDrafts();
                } else {
                    showToast('删除失败：' + result.message, 'error');
                }
            } catch (error) {
                console.error('删除草稿失败:', error);
                showToast('删除失败，请检查网络连接', 'error');
            }
        }

        // 获取纯文本预览
        function getPlainTextPreview(html) {
            if (!html) return '无内容';
            
            // 移除 HTML 标签
            const temp = document.createElement('div');
            temp.innerHTML = html;
            const text = temp.textContent || temp.innerText || '';
            
            // 截取前100个字符
            return text.substring(0, 100) + (text.length > 100 ? '...' : '');
        }

        // 格式化日期时间
        function formatDateTime(dateTimeString) {
            if (!dateTimeString) return '';
            
            const date = new Date(dateTimeString);
            const year = date.getFullYear();
            const month = String(date.getMonth() + 1).padStart(2, '0');
            const day = String(date.getDate()).padStart(2, '0');
            const hours = String(date.getHours()).padStart(2, '0');
            const minutes = String(date.getMinutes()).padStart(2, '0');
            
            return `${year}-${month}-${day} ${hours}:${minutes}`;
        }

        // HTML 转义
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // 显示提示信息
        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast toast-${type}`;
            toast.style.display = 'block';
            
            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        // 返回上一页
        function goBack() {
            if (window.history.length > 1) {
                window.history.back();
            } else {
                window.location.href = '/';
            }
        }
    </script>
</body>
</html>
